<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E0 Prospector · ABSTORAGES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #00e87a; --verde-dim: rgba(0,232,122,.1); --azul: #4a9eff;
      --amber: #f5a623; --rojo: #ff4a4a; --purple: #a78bfa;
      --fondo: #07090e; --s1: #0d1117; --s2: #111620; --s3: #161d2a;
      --br: rgba(255,255,255,.07); --br2: rgba(255,255,255,.12);
      --t1: #edf0f4; --t2: #7e8899; --t3: #4a5568;
      --sans: 'Poppins', sans-serif; --r: 10px;
    }
    html, body { background: var(--fondo); color: var(--t1); font-family: var(--sans); min-height: 100%; }

    header {
      display: flex; align-items: center; gap: 14px; justify-content: space-between;
      padding: 0 32px; height: 56px; background: var(--s1); border-bottom: 1px solid var(--br2);
      position: sticky; top: 0; z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .icon { font-size: 22px; }
    .title-block .name { font-size: 16px; font-weight: 800; }
    .title-block .sub  { font-size: 10px; color: var(--t2); }
    header img { height: 28px; background: #fff; border-radius: 6px; padding: 3px 8px; }

    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }

    /* API Status bar */
    .api-status-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 18px; padding: 10px 14px;
      background: var(--s1); border: 1px solid var(--br); border-radius: var(--r);
      font-size: 11px;
    }
    .api-status-label { color: var(--t2); font-weight: 600; margin-right: 4px; }
    .api-badge {
      padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
    }
    .api-badge.on  { background: rgba(0,232,122,.12); color: var(--verde); border: 1px solid rgba(0,232,122,.2); }
    .api-badge.off { background: var(--s2); color: var(--t3); border: 1px solid var(--br); }
    .api-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* Form */
    .form-card {
      background: var(--s1); border: 1px solid var(--br2);
      border-radius: 14px; padding: 24px 28px; margin-bottom: 18px;
    }
    .form-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--t1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
    label { font-size: 10px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: 5px; }
    select, input[type="text"] {
      width: 100%; background: var(--s2); border: 1px solid var(--br2);
      border-radius: var(--r); color: var(--t1); font-family: var(--sans);
      font-size: 13px; padding: 9px 12px; outline: none; transition: border-color .15s;
    }
    select:focus, input:focus { border-color: var(--verde); }
    .btn-buscar {
      padding: 9px 22px; background: var(--verde); border: none; border-radius: var(--r);
      color: #07090e; font-family: var(--sans); font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;
      transition: opacity .15s;
    }
    .btn-buscar:hover { opacity: .88; } .btn-buscar:disabled { opacity: .4; cursor: not-allowed; }

    /* Estado */
    .status-bar { font-size: 12px; color: var(--t2); margin-bottom: 16px; min-height: 18px; display: flex; align-items: center; gap: 8px; }
    .status-bar.searching { color: var(--amber); }
    .status-bar.done { color: var(--verde); }

    /* Fuentes strip */
    .fuentes-strip {
      display: none; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-bottom: 16px; font-size: 11px; color: var(--t2);
    }
    .fuentes-strip.show { display: flex; }
    .fuente-tag {
      padding: 2px 9px; border-radius: 100px; font-size: 10px; font-weight: 700;
    }
    .fuente-apollo   { background: rgba(255,165,0,.1);  color: #f5a623; border: 1px solid rgba(245,166,35,.2); }
    .fuente-lusha    { background: rgba(74,158,255,.1); color: var(--azul); border: 1px solid rgba(74,158,255,.2); }
    .fuente-zoominfo { background: rgba(167,139,250,.1);color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
    .fuente-linkedin { background: rgba(0,119,181,.15); color: #0077b5; border: 1px solid rgba(0,119,181,.25); }
    .fuente-ia       { background: rgba(0,232,122,.1);  color: var(--verde); border: 1px solid rgba(0,232,122,.15); }

    /* Resultados */
    .results { display: flex; flex-direction: column; gap: 14px; }
    .prospect-card {
      background: var(--s1); border: 1px solid var(--br);
      border-radius: 14px; padding: 20px 22px;
      transition: border-color .15s;
    }
    .prospect-card:hover { border-color: var(--br2); }
    .prospect-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .prospect-num { font-size: 10px; font-weight: 800; color: var(--t3); margin-bottom: 3px; }
    .prospect-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
    .prospect-sector { font-size: 11px; color: var(--t2); }

    /* Contact chips */
    .contact-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500;
      background: var(--s2); border: 1px solid var(--br2); color: var(--t2);
      text-decoration: none; transition: all .15s;
    }
    .chip:hover { border-color: var(--br2); color: var(--t1); }
    .chip.email   { color: var(--amber); border-color: rgba(245,166,35,.2); background: rgba(245,166,35,.07); }
    .chip.phone   { color: var(--verde); border-color: rgba(0,232,122,.2);  background: rgba(0,232,122,.07); }
    .chip.linkedin{ color: #0077b5;       border-color: rgba(0,119,181,.25); background: rgba(0,119,181,.08); }
    .chip.web     { color: var(--azul);   border-color: rgba(74,158,255,.2); background: rgba(74,158,255,.07); }
    .chip.emp     { color: var(--t3); }

    .prospect-why {
      font-size: 12px; color: var(--t2); line-height: 1.55; margin-bottom: 14px;
      padding: 8px 12px; background: var(--s2); border-radius: 6px;
      border-left: 2px solid var(--br2);
    }
    .prospect-msg-label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; margin-bottom: 6px; }
    .prospect-msg {
      font-size: 12px; line-height: 1.7; color: var(--t1);
      background: var(--verde-dim); border: 1px solid rgba(0,232,122,.12);
      border-radius: 8px; border-top-left-radius: 2px;
      padding: 12px 14px; white-space: pre-wrap;
    }
    .prospect-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-copy {
      padding: 6px 14px; background: var(--s2); border: 1px solid var(--br2);
      border-radius: 6px; color: var(--t2); font-family: var(--sans); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-copy:hover { border-color: var(--verde); color: var(--verde); }
    .btn-copy.copied { border-color: var(--verde); color: var(--verde); }
    .btn-wa {
      padding: 6px 14px; background: rgba(37,211,102,.1); border: 1px solid rgba(37,211,102,.25);
      border-radius: 6px; color: #25D366; font-family: var(--sans); font-size: 11px; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: all .15s;
    }
    .btn-wa:hover { background: rgba(37,211,102,.18); }
    .source-tag {
      padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 700;
      background: var(--s2); border: 1px solid var(--br); color: var(--t3);
      margin-left: auto;
    }

    /* Empty */
    .empty { text-align: center; padding: 60px 24px; color: var(--t2); font-size: 13px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Loading dots */
    .loading { display: flex; flex-direction: column; gap: 12px; align-items: center; padding: 40px; justify-content: center; }
    .loading-text { font-size: 12px; color: var(--t2); }
    .ldots { display: flex; gap: 6px; }
    .ldot { width: 8px; height: 8px; border-radius: 50%; background: var(--verde); animation: ldotPulse 1.2s ease infinite; }
    .ldot:nth-child(2) { animation-delay: .2s; } .ldot:nth-child(3) { animation-delay: .4s; }
    @keyframes ldotPulse { 0%,100%{ opacity:.3; transform:scale(.8); } 50%{ opacity:1; transform:scale(1.2); } }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="icon">🔍</span>
    <div class="title-block">
      <div class="name">E0 Prospector</div>
      <div class="sub">Encuentra empresas que necesitan flete · ABSTORAGES</div>
    </div>
  </div>
  <img src="/img/logo.png" alt="ABSTORAGES"/>
</header>

<div class="wrap">

  <!-- API Status -->
  <div class="api-status-bar" id="api-status-bar">
    <span class="api-status-label">Fuentes:</span>
    <span class="api-badge off" id="badge-apollo"><span class="dot"></span>Apollo.io</span>
    <span class="api-badge off" id="badge-lusha"><span class="dot"></span>Lusha</span>
    <span class="api-badge off" id="badge-zoominfo"><span class="dot"></span>ZoomInfo</span>
    <span class="api-badge off" id="badge-linkedin"><span class="dot"></span>LinkedIn</span>
    <span class="api-badge on"  id="badge-ia"><span class="dot"></span>IA Generativa</span>
  </div>

  <div class="form-card">
    <div class="form-title">¿A quién quieres prospectar?</div>
    <div class="form-row">
      <div>
        <label>Sector / Industria</label>
        <select id="sector">
          <option value="manufactura">Manufactura e industria</option>
          <option value="alimentos y bebidas">Alimentos y bebidas</option>
          <option value="retail y distribución">Retail y distribución</option>
          <option value="farmacéutica y salud">Farmacéutica y salud</option>
          <option value="automotriz">Automotriz y autopartes</option>
          <option value="construcción">Construcción y materiales</option>
          <option value="textil y moda">Textil y moda</option>
          <option value="electrónica">Electrónica y tecnología</option>
          <option value="agro y campo">Agroindustria y campo</option>
          <option value="química e industrial">Química e industrial</option>
        </select>
      </div>
      <div>
        <label>Ciudad / Zona</label>
        <input type="text" id="zona" placeholder="Ej: Monterrey, CDMX, Guadalajara..." value="Monterrey"/>
      </div>
      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Buscar prospectos
      </button>
    </div>
  </div>

  <div class="fuentes-strip" id="fuentes-strip"></div>
  <div class="status-bar" id="status"></div>
  <div id="results">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div>Selecciona un sector y ciudad para generar tu lista de prospectos con mensajes personalizados de WhatsApp.</div>
    </div>
  </div>
</div>

<script>
  let searching = false;

  // Cargar estado de APIs al inicio
  fetch('/api/prospector/status').then(r => r.json()).then(s => {
    if (s.apollo)    toggleBadge('apollo',    true);
    if (s.lusha)     toggleBadge('lusha',     true);
    if (s.zoominfo)  toggleBadge('zoominfo',  true);
    if (s.linkedin)  toggleBadge('linkedin',  true);
  }).catch(() => {});

  function toggleBadge(name, active) {
    const el = document.getElementById('badge-' + name);
    if (!el) return;
    el.className = 'api-badge ' + (active ? 'on' : 'off');
  }

  async function buscar() {
    if (searching) return;
    const sector = document.getElementById('sector').value;
    const zona   = document.getElementById('zona').value.trim();
    if (!zona) { alert('Escribe una ciudad o zona.'); return; }

    searching = true;
    document.getElementById('btn-buscar').disabled = true;
    document.getElementById('fuentes-strip').className = 'fuentes-strip';
    setStatus('searching', `Buscando empresas de ${sector} en ${zona}...`);
    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="ldots"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>
        <div class="loading-text" id="load-txt">Consultando Apollo.io, Lusha, ZoomInfo, LinkedIn...</div>
      </div>`;

    setTimeout(() => {
      const t = document.getElementById('load-txt');
      if (t) t.textContent = 'Enriqueciendo resultados con IA...';
    }, 3000);

    try {
      const res  = await fetch('/api/prospector/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sector, zona }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al generar prospectos');

      renderResultados(data.prospectos, sector, zona, data.fuentes || [], data.modo);
      setStatus('done', `${data.prospectos.length} prospectos encontrados en ${zona} · ${sector}`);
      renderFuentesStrip(data.fuentes || [], data.modo);
    } catch(e) {
      document.getElementById('results').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;
      setStatus('', '');
    }

    searching = false;
    document.getElementById('btn-buscar').disabled = false;
  }

  function setStatus(cls, txt) {
    const el = document.getElementById('status');
    el.className = 'status-bar' + (cls ? ' ' + cls : '');
    el.textContent = txt;
  }

  function renderFuentesStrip(fuentes, modo) {
    const strip = document.getElementById('fuentes-strip');
    if (!fuentes.length) { strip.className = 'fuentes-strip'; return; }
    strip.innerHTML = '<span style="color:var(--t3);font-size:10px;font-weight:600">DATOS DE:</span> ' +
      fuentes.map(f => `<span class="fuente-tag ${fuenteClass(f)}">${f}</span>`).join('');
    if (modo === 'ia') strip.innerHTML += '<span style="color:var(--t3);font-size:10px;margin-left:4px">— Empresas representativas generadas por IA</span>';
    strip.className = 'fuentes-strip show';
  }

  function fuenteClass(f) {
    const lf = f.toLowerCase();
    if (lf.includes('apollo'))   return 'fuente-apollo';
    if (lf.includes('lusha'))    return 'fuente-lusha';
    if (lf.includes('zoominfo')) return 'fuente-zoominfo';
    if (lf.includes('linkedin')) return 'fuente-linkedin';
    return 'fuente-ia';
  }

  function renderResultados(prospectos, sector, zona, fuentes, modo) {
    document.getElementById('results').innerHTML = `
      <div class="results">
        ${prospectos.map((p, i) => `
          <div class="prospect-card">
            <div class="prospect-head">
              <div>
                <div class="prospect-num">#${i+1} · ${esc(sector.toUpperCase())} · ${esc(zona.toUpperCase())}</div>
                <div class="prospect-name">${esc(p.empresa)}</div>
                <div class="prospect-sector">${esc(p.giro || '')}</div>
              </div>
              ${p.fuente ? `<span class="source-tag">${esc(p.fuente)}</span>` : ''}
            </div>
            ${buildContactRow(p)}
            <div class="prospect-why">💡 ${esc(p.por_que || '')}</div>
            <div class="prospect-msg-label">Mensaje WhatsApp personalizado</div>
            <div class="prospect-msg" id="msg-${i}">${esc(p.mensaje || '')}</div>
            <div class="prospect-actions">
              <button class="btn-copy" onclick="copiar(${i}, this)">📋 Copiar mensaje</button>
              ${p.mensaje ? `<a class="btn-wa" href="https://wa.me/?text=${encodeURIComponent(p.mensaje)}" target="_blank">📱 Abrir en WhatsApp</a>` : ''}
              ${p.telefono ? `<a class="btn-wa" href="https://wa.me/${sanitizePhone(p.telefono)}?text=${encodeURIComponent(p.mensaje || '')}" target="_blank">📞 WA directo</a>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function buildContactRow(p) {
    const chips = [];
    if (p.email)    chips.push(`<a class="chip email"  href="mailto:${esc(p.email)}"  target="_blank">✉ ${esc(p.email)}</a>`);
    if (p.telefono) chips.push(`<span class="chip phone">📞 ${esc(p.telefono)}</span>`);
    if (p.linkedin) chips.push(`<a class="chip linkedin" href="${esc(p.linkedin)}" target="_blank">in LinkedIn</a>`);
    if (p.website)  chips.push(`<a class="chip web"  href="${p.website.startsWith('http') ? '' : 'https://'}${esc(p.website)}" target="_blank">🌐 ${esc(p.website)}</a>`);
    if (p.empleados)chips.push(`<span class="chip emp">👥 ${esc(String(p.empleados))} emp.</span>`);
    if (!chips.length) return '';
    return `<div class="contact-row">${chips.join('')}</div>`;
  }

  function sanitizePhone(phone) {
    return (phone || '').replace(/\D/g, '');
  }

  function copiar(i, btn) {
    const txt = document.getElementById('msg-' + i).textContent;
    navigator.clipboard.writeText(txt).then(() => {
      btn.textContent = '✓ Copiado'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copiar mensaje'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
