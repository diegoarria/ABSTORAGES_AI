<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABSTORAGES — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #00e87a;
      --azul:  #4a9eff;
      --rojo:  #ff4a4a;
      --fondo: #07090e;
      --s1:    #0d1117;
      --s2:    #111620;
      --s3:    #161d2a;
      --br:    rgba(255,255,255,.06);
      --br2:   rgba(255,255,255,.1);
      --t1: #edf0f4;
      --t2: #7e8899;
      --t3: #4a5568;
      --sans: 'Poppins', sans-serif;
    }
    [data-theme="light"] {
      --fondo: #f0f4f8;
      --s1:    #ffffff;
      --s2:    #e8eef6;
      --s3:    #dce5f0;
      --br:    rgba(0,0,0,.08);
      --br2:   rgba(0,0,0,.14);
      --t1: #111827;
      --t2: #4b5563;
      --t3: #9ca3af;
    }
    html, body {
      height: 100%;
      background: var(--fondo);
      font-family: var(--sans);
      color: var(--t1);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 0%,  rgba(0,232,122,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 100%, rgba(74,158,255,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--s1);
      border: 1px solid var(--br);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    [data-theme="light"] .card {
      box-shadow: 0 8px 40px rgba(0,0,0,.1);
      border-color: var(--br2);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .logo-wrap img {
      height: 120px;
      background: #fff;
      border-radius: 10px;
      padding: 10px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 13px;
      color: var(--t2);
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--br2);
      border-radius: 8px;
      color: var(--t1);
      font-family: var(--sans);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--verde); }
    input::placeholder { color: var(--t3); }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: var(--verde);
      border: none;
      border-radius: 8px;
      color: #07090e;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .45; cursor: not-allowed; }

    .error-msg {
      display: none;
      font-size: 12px;
      color: var(--rojo);
      text-align: center;
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(255,74,74,.08);
      border: 1px solid rgba(255,74,74,.2);
      border-radius: 6px;
    }
    .error-msg.show { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--br);
      margin: 24px 0 20px;
    }

    .demo-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }
    .demo-users {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .demo-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      width: 100%;
    }
    .demo-btn:hover { border-color: var(--br2); background: var(--s3); }
    .demo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .demo-dot.admin { background: var(--verde); }
    .demo-dot.cliente { background: var(--azul); }
    .demo-dot.transportista { background: #f5a623; }
    .demo-info { flex: 1; }
    .demo-name { font-size: 12px; font-weight: 600; color: var(--t1); }
    .demo-role { font-size: 10px; color: var(--t2); margin-top: 1px; }
    .demo-arrow { font-size: 12px; color: var(--t3); }

    .theme-btn {
      position: absolute;
      top: 20px; right: 20px;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--s1);
      border: 1px solid var(--br2);
      color: var(--t2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .icon-sun { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }
    [data-theme="light"] .icon-moon { display: none; }

    /* ── SPLASH ───────────────────────────────────────────────────────────── */
    #splash {
      position: fixed; inset: 0;
      background: var(--fondo);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transition: opacity .55s ease;
    }
    #splash::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%,  rgba(0,232,122,.09) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 90%,  rgba(74,158,255,.07) 0%, transparent 55%);
      pointer-events: none;
    }
    #splash.out { opacity: 0; pointer-events: none; }

    #splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: splashRise .7s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes splashRise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #splash-logo {
      height: 100px;
      background: #fff;
      border-radius: 14px;
      padding: 14px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
    }
    [data-theme="light"] #splash-logo {
      box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06);
    }

    #splash-tagline {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--t2);
      opacity: 0;
      animation: fadeUp .5s ease .55s forwards;
    }

    #splash-dots {
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeUp .4s ease .7s forwards;
    }
    .sdot {
      width: 5px; height: 5px;
      border-radius: 50%;
      animation: sdotPulse 1.4s ease infinite;
    }
    .sdot:nth-child(1) { background: var(--verde); animation-delay: 0s; }
    .sdot:nth-child(2) { background: var(--azul);  animation-delay: .2s; }
    .sdot:nth-child(3) { background: var(--verde); animation-delay: .4s; }
    @keyframes sdotPulse {
      0%,100% { opacity: .3; transform: scale(.8); }
      50%     { opacity: 1;  transform: scale(1.3); }
    }

    #splash-bar-wrap {
      width: 180px;
      opacity: 0;
      animation: fadeUp .4s ease .75s forwards;
    }
    #splash-bar {
      width: 100%;
      height: 2px;
      background: var(--br2);
      border-radius: 1px;
      overflow: hidden;
    }
    #splash-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--verde), var(--azul));
      border-radius: 1px;
      animation: barFill 2s cubic-bezier(.4,0,.2,1) .8s forwards;
    }
    @keyframes barFill {
      0%  { width: 0%; }
      65% { width: 82%; }
      100%{ width: 100%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* La página del login empieza invisible y aparece tras el splash */
    .page { opacity: 0; transition: opacity .45s ease; }
    .page.visible { opacity: 1; }
  </style>
</head>
<body>

<!-- ── SPLASH ─────────────────────────────────────────────────────────────── -->
<div id="splash">
  <div id="splash-inner">
    <img id="splash-logo" src="/img/logo.png" alt="ABSTORAGES"/>
    <div id="splash-tagline">AI · Logistics · Intelligence</div>
    <div id="splash-dots">
      <div class="sdot"></div>
      <div class="sdot"></div>
      <div class="sdot"></div>
    </div>
    <div id="splash-bar-wrap">
      <div id="splash-bar"><div id="splash-fill"></div></div>
    </div>
  </div>
</div>

<div class="page">
  <button class="theme-btn" id="theme-btn">
    <span class="icon-moon">🌙</span>
    <span class="icon-sun">☀️</span>
  </button>

  <div class="card">
    <div class="logo-wrap">
      <img src="/img/logo.png" alt="ABSTORAGES"/>
    </div>

    <h1>Bienvenido</h1>
    <p class="sub">Ingresa tus credenciales para acceder</p>

    <form id="login-form">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="tu@email.com" autocomplete="email" required/>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn-login" type="submit" id="btn-submit">Ingresar</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <hr class="divider"/>

    <div class="demo-title">Accesos de demo</div>
    <div class="demo-users">
      <button class="demo-btn" data-email="admin@abstorages.com" data-pass="abstorages2025">
        <div class="demo-dot admin"></div>
        <div class="demo-info">
          <div class="demo-name">Admin ABSTORAGES</div>
          <div class="demo-role">Acceso completo · KPIs · GPS · Tarifas</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
      <button class="demo-btn" data-email="rafael@bonafont.com" data-pass="cliente123">
        <div class="demo-dot cliente"></div>
        <div class="demo-info">
          <div class="demo-name">Rafael Garza · Bonafont</div>
          <div class="demo-role">Cliente · Solo sus folios y chat con SARA</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
      <button class="demo-btn" data-email="juan@op.com" data-pass="operador123">
        <div class="demo-dot transportista"></div>
        <div class="demo-info">
          <div class="demo-name">Juan Hernández · Operador</div>
          <div class="demo-role">Transportista · Sus viajes y chat con SOFIA</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
    </div>
  </div>
</div>

<script>
  // Theme (se aplica antes del primer render)
  const html = document.documentElement;
  const saved = localStorage.getItem('abs-theme');
  if (saved) html.setAttribute('data-theme', saved);

  // Splash → Login
  window.addEventListener('DOMContentLoaded', () => {
    const splash = document.getElementById('splash');
    const page   = document.querySelector('.page');

    // Esperar a que la barra termine (~2.8s desde inicio de página)
    setTimeout(() => {
      splash.classList.add('out');
      setTimeout(() => {
        splash.style.display = 'none';
        page.classList.add('visible');
      }, 560);
    }, 2600);
  });
  document.getElementById('theme-btn').addEventListener('click', () => {
    const t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', t);
    localStorage.setItem('abs-theme', t);
  });

  // Demo buttons
  document.querySelectorAll('.demo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('email').value = btn.dataset.email;
      document.getElementById('password').value = btn.dataset.pass;
      document.getElementById('login-form').requestSubmit();
    });
  });

  // Login form
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al ingresar');
      window.location.href = '/';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
