<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABSTORAGES — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #00e87a;
      --azul:  #4a9eff;
      --rojo:  #ff4a4a;
      --fondo: #07090e;
      --s1:    #0d1117;
      --s2:    #111620;
      --s3:    #161d2a;
      --br:    rgba(255,255,255,.06);
      --br2:   rgba(255,255,255,.1);
      --t1: #edf0f4;
      --t2: #7e8899;
      --t3: #4a5568;
      --sans: 'Poppins', sans-serif;
    }
    [data-theme="light"] {
      --fondo: #f0f4f8;
      --s1:    #ffffff;
      --s2:    #e8eef6;
      --s3:    #dce5f0;
      --br:    rgba(0,0,0,.08);
      --br2:   rgba(0,0,0,.14);
      --t1: #111827;
      --t2: #4b5563;
      --t3: #9ca3af;
    }
    html, body {
      height: 100%;
      background: var(--fondo);
      font-family: var(--sans);
      color: var(--t1);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 0%,  rgba(0,232,122,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 100%, rgba(74,158,255,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--s1);
      border: 1px solid var(--br);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .logo-wrap img {
      height: 36px;
      background: #fff;
      border-radius: 6px;
      padding: 5px 14px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 13px;
      color: var(--t2);
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--br2);
      border-radius: 8px;
      color: var(--t1);
      font-family: var(--sans);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--verde); }
    input::placeholder { color: var(--t3); }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: var(--verde);
      border: none;
      border-radius: 8px;
      color: #07090e;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .45; cursor: not-allowed; }

    .error-msg {
      display: none;
      font-size: 12px;
      color: var(--rojo);
      text-align: center;
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(255,74,74,.08);
      border: 1px solid rgba(255,74,74,.2);
      border-radius: 6px;
    }
    .error-msg.show { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--br);
      margin: 24px 0 20px;
    }

    .demo-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }
    .demo-users {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .demo-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      width: 100%;
    }
    .demo-btn:hover { border-color: var(--br2); background: var(--s3); }
    .demo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .demo-dot.admin { background: var(--verde); }
    .demo-dot.cliente { background: var(--azul); }
    .demo-dot.transportista { background: #f5a623; }
    .demo-info { flex: 1; }
    .demo-name { font-size: 12px; font-weight: 600; color: var(--t1); }
    .demo-role { font-size: 10px; color: var(--t2); margin-top: 1px; }
    .demo-arrow { font-size: 12px; color: var(--t3); }

    .theme-btn {
      position: absolute;
      top: 20px; right: 20px;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--s1);
      border: 1px solid var(--br2);
      color: var(--t2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .icon-sun { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }
    [data-theme="light"] .icon-moon { display: none; }
  </style>
</head>
<body>
<div class="page">
  <button class="theme-btn" id="theme-btn">
    <span class="icon-moon">🌙</span>
    <span class="icon-sun">☀️</span>
  </button>

  <div class="card">
    <div class="logo-wrap">
      <img src="/img/logo.png" alt="ABSTORAGES"/>
    </div>

    <h1>Bienvenido</h1>
    <p class="sub">Ingresa tus credenciales para acceder</p>

    <form id="login-form">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="tu@email.com" autocomplete="email" required/>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn-login" type="submit" id="btn-submit">Ingresar</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <hr class="divider"/>

    <div class="demo-title">Accesos de demo</div>
    <div class="demo-users">
      <button class="demo-btn" data-email="admin@abstorages.com" data-pass="abstorages2025">
        <div class="demo-dot admin"></div>
        <div class="demo-info">
          <div class="demo-name">Admin ABSTORAGES</div>
          <div class="demo-role">Acceso completo · KPIs · GPS · Tarifas</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
      <button class="demo-btn" data-email="rafael@bonafont.com" data-pass="cliente123">
        <div class="demo-dot cliente"></div>
        <div class="demo-info">
          <div class="demo-name">Rafael Garza · Bonafont</div>
          <div class="demo-role">Cliente · Solo sus folios y chat con SARA</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
      <button class="demo-btn" data-email="juan@op.com" data-pass="operador123">
        <div class="demo-dot transportista"></div>
        <div class="demo-info">
          <div class="demo-name">Juan Hernández · Operador</div>
          <div class="demo-role">Transportista · Sus viajes y chat con SOFIA</div>
        </div>
        <span class="demo-arrow">→</span>
      </button>
    </div>
  </div>
</div>

<script>
  // Theme
  const html = document.documentElement;
  const saved = localStorage.getItem('abs-theme');
  if (saved) html.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').addEventListener('click', () => {
    const t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', t);
    localStorage.setItem('abs-theme', t);
  });

  // Demo buttons
  document.querySelectorAll('.demo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('email').value = btn.dataset.email;
      document.getElementById('password').value = btn.dataset.pass;
      document.getElementById('login-form').requestSubmit();
    });
  });

  // Login form
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    err.classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al ingresar');
      window.location.href = '/';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
