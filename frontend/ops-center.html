<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSTORAGES · AI Ops Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:       #07111C;
  --surface:  #0B1A28;
  --card:     #0F2235;
  --card-h:   #132B42;

  /* Brand */
  --green:    #00B451;
  --green-d:  rgba(0,180,81,0.11);
  --green-b:  rgba(0,180,81,0.24);
  --navy:     #203C52;

  /* Semantic — DO NOT substitute with brand colors */
  --red:      #EF4444;
  --red-d:    rgba(239,68,68,0.10);
  --red-b:    rgba(239,68,68,0.26);
  --orange:   #F97316;
  --orange-d: rgba(249,115,22,0.10);
  --amber:    #F59E0B;
  --amber-d:  rgba(245,158,11,0.10);
  --gray:     #6B7280;
  --gray-d:   rgba(107,114,128,0.10);
  --blue:     #60A5FA;
  --blue-d:   rgba(96,165,250,0.10);

  /* Text */
  --t1: #D9E8F4;
  --t2: #6A90AB;
  --t3: #3C5C72;

  /* Chrome */
  --bdr:  rgba(255,255,255,0.07);
  --bdr2: rgba(255,255,255,0.12);

  /* Geometry */
  --r: 8px;

  /* Typography */
  --sans: 'Inter', 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'DM Mono', 'Cascadia Code', 'SF Mono', ui-monospace, monospace;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--t1);
  font-size: 13px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ═══════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════ */
.hdr {
  height: 54px;
  background: #060E17;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  flex-shrink: 0;
  z-index: 100;
}

.hdr-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}

.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(145deg, #00B451 0%, #007038 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900;
  color: #fff; letter-spacing: 0.04em;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,180,81,0.25);
}

.logo-stack {
  display: flex; flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 12.5px; font-weight: 800;
  letter-spacing: 0.05em;
  color: var(--t1);
}

.logo-sub {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.13em;
  color: var(--green);
}

.hdr-sep {
  width: 1px; height: 22px;
  background: var(--bdr);
  margin: 0 18px;
}

.hdr-nav {
  display: flex; gap: 3px;
}

.hdr-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11.5px; font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  background: none;
  color: var(--t2);
  letter-spacing: 0.02em;
  transition: all 0.12s;
  font-family: inherit;
}

.hdr-pill.on {
  background: rgba(0,180,81,0.1);
  border-color: rgba(0,180,81,0.28);
  color: var(--green);
}

.hdr-pill:hover:not(.on) {
  background: rgba(255,255,255,0.04);
  color: var(--t1);
}

.hdr-right {
  margin-left: auto;
  display: flex; align-items: center;
  gap: 14px;
}

.hdr-clock {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--t2);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}

.hdr-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 11px;
  border-radius: 20px;
  font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.02em;
  background: var(--red-d);
  border: 1px solid var(--red-b);
  color: var(--red);
}

.hdr-badge.ok {
  background: var(--green-d);
  border-color: var(--green-b);
  color: var(--green);
}

.hdr-badge .blink {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  animation: blink-dot 1.4s ease-in-out infinite;
}

@keyframes blink-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

/* ═══════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════ */
.workspace {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ═══════════════════════════════════════════════════════
   SHARED PANEL CHROME
   ═══════════════════════════════════════════════════════ */
.panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.panel-noa    { flex: 6; border-right: 1px solid var(--bdr); }
.panel-hector { flex: 4; }

.panel-head {
  height: 50px;
  display: flex; align-items: center;
  padding: 0 18px; gap: 10px;
  background: #060E17;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}

.agent-mark {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 900; flex-shrink: 0;
}

.agent-mark.noa {
  background: var(--red-d); color: var(--red);
  border: 1px solid var(--red-b);
}

.agent-mark.hector {
  background: var(--green-d); color: var(--green);
  border: 1px solid var(--green-b);
}

.agent-label {
  display: flex; align-items: baseline; gap: 7px;
}

.agent-name {
  font-size: 13px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
}

.agent-name.noa    { color: var(--red); }
.agent-name.hector { color: var(--green); }

.agent-role {
  font-size: 10.5px; color: var(--t3);
  font-weight: 400; letter-spacing: 0;
  padding-left: 7px;
  border-left: 1px solid var(--bdr);
}

.chips { display: flex; gap: 5px; margin-left: 3px; }

.chip {
  padding: 2px 8px; border-radius: 12px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.03em;
}

.chip-r { background: var(--red-d); color: var(--red); border: 1px solid var(--red-b); }
.chip-o { background: var(--orange-d); color: var(--orange); border: 1px solid rgba(249,115,22,0.24); }
.chip-g { background: var(--green-d); color: var(--green); border: 1px solid var(--green-b); }

.panel-btns { margin-left: auto; display: flex; gap: 6px; }

/* ═══════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════ */
.btn {
  padding: 5px 12px; border-radius: 6px;
  font-size: 11.5px; font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--bdr2);
  background: rgba(255,255,255,0.04);
  color: var(--t2);
  letter-spacing: 0.02em;
  transition: all 0.12s;
  white-space: nowrap;
  font-family: inherit;
}

.btn:hover { background: rgba(255,255,255,0.08); color: var(--t1); }

.btn-g { background: var(--green); color: #fff; border-color: transparent; }
.btn-g:hover { background: #00a040; color: #fff; }

.btn-r { background: var(--red-d); color: var(--red); border-color: var(--red-b); }
.btn-r:hover { background: rgba(239,68,68,0.17); }

.btn-sm { padding: 3px 9px; font-size: 10.5px; border-radius: 5px; }

/* ═══════════════════════════════════════════════════════
   CRITICAL BANNER
   ═══════════════════════════════════════════════════════ */
.crit-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 18px;
  background: rgba(239,68,68,0.06);
  border-bottom: 1px solid rgba(239,68,68,0.18);
  flex-shrink: 0;
}

.crit-pulse {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  animation: pulse-ring 1.3s ease-in-out infinite;
}

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
  70%  { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

.crit-main {
  font-size: 11.5px; font-weight: 700;
  color: var(--red); letter-spacing: 0.03em;
}

.crit-detail {
  font-size: 10.5px;
  color: rgba(239,68,68,0.55);
  margin-top: 1px;
}

/* ═══════════════════════════════════════════════════════
   SECTION SEPARATORS
   ═══════════════════════════════════════════════════════ */
.sec-sep {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 18px 5px;
  font-size: 9.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--t3); flex-shrink: 0;
}

.sec-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--bdr);
}

/* ═══════════════════════════════════════════════════════
   PANEL BODY
   ═══════════════════════════════════════════════════════ */
.panel-body { flex: 1; overflow-y: auto; overflow-x: hidden; }

.cards { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

/* ═══════════════════════════════════════════════════════
   FOLIO CARDS — NOA
   ═══════════════════════════════════════════════════════ */
.fc {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-left-width: 3px;
  border-radius: var(--r);
  padding: 13px 14px;
  transition: background 0.12s;
}

.fc:hover { background: var(--card-h); }
.fc.cr { border-left-color: var(--red); }
.fc.at { border-left-color: var(--orange); }
.fc.no { border-left-color: #172F45; }

.fc-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  gap: 12px; margin-bottom: 9px;
}

.fc-id {
  font-family: var(--mono);
  font-size: 12.5px; font-weight: 500;
  color: var(--t1); letter-spacing: 0.04em;
}

.fc-placa {
  font-size: 10px; color: var(--t3);
  font-family: var(--mono); margin-left: 5px;
}

.fc-cliente { font-size: 11.5px; color: var(--t2); margin-top: 1px; }

.fc-ruta {
  font-size: 11px; color: var(--t3);
  display: flex; align-items: center; gap: 5px;
  margin-top: 2px;
}

.fc-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

.bdg {
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
}

.bdg-tr { background: var(--blue-d); color: var(--blue); border: 1px solid rgba(96,165,250,0.22); }
.bdg-ca { background: var(--amber-d); color: var(--amber); border: 1px solid rgba(245,158,11,0.22); }
.bdg-de { background: var(--green-d); color: var(--green); border: 1px solid var(--green-b); }
.bdg-in { background: var(--red-d); color: var(--red); border: 1px solid var(--red-b); }
.bdg-cr { background: var(--red-d); color: var(--red); border: 1px solid var(--red-b); }
.bdg-at { background: var(--orange-d); color: var(--orange); border: 1px solid rgba(249,115,22,0.24); }
.bdg-no { background: var(--green-d); color: var(--green); border: 1px solid var(--green-b); }

.fc-meta {
  display: flex; flex-wrap: wrap;
  align-items: center; gap: 14px;
}

.kv { display: flex; align-items: center; gap: 4px; font-size: 11px; }
.kv-k { color: var(--t3); }
.kv-v { color: var(--t2); font-weight: 500; }

.tmr { font-family: var(--mono); font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.tmr-ok { color: var(--green); }
.tmr-w  { color: var(--orange); }
.tmr-cr { color: var(--red); }

.riesgo-pill {
  margin-left: auto;
  font-size: 10px; font-weight: 800;
  color: var(--red); text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--red-d); border: 1px solid var(--red-b);
  padding: 2px 7px; border-radius: 4px;
}

.fc-inc {
  margin-top: 8px;
  font-size: 11px; color: rgba(239,68,68,0.75);
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.14);
  border-radius: 5px;
  padding: 5px 10px;
}

/* ─── Escalacion Log ─── */
.esc {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(239,68,68,0.13);
}

.esc-hdr {
  font-size: 9.5px; font-weight: 800;
  color: var(--red); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}

.esc-steps { display: flex; flex-direction: column; gap: 5px; }

.esc-step {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
}

.esc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.esc-dot.sr { background: var(--red); }
.esc-dot.ok { background: var(--green); }
.esc-dot.act { background: var(--orange); animation: blink-dot 1s ease-in-out infinite; }
.esc-dot.pd { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }

.esc-nivel { color: var(--t2); font-weight: 600; width: 90px; flex-shrink: 0; }
.esc-hora { color: var(--t3); font-family: var(--mono); font-size: 10.5px; width: 44px; flex-shrink: 0; }
.esc-st { margin-left: auto; font-size: 10.5px; font-weight: 700; }
.esc-st.sr  { color: var(--red); }
.esc-st.ok  { color: var(--green); }
.esc-st.act { color: var(--orange); }
.esc-st.pd  { color: var(--t3); }

.esc-acts { margin-top: 9px; display: flex; gap: 7px; }

/* ═══════════════════════════════════════════════════════
   HÉCTOR — KPI BAR
   ═══════════════════════════════════════════════════════ */
.kpi-bar {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; padding: 12px 16px;
  background: #060E17;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}

.kpi-card {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 10px 12px;
}

.kpi-lbl {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--t3); margin-bottom: 4px;
}

.kpi-val {
  font-size: 18px; font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

.kpi-sub { font-size: 10px; color: var(--t3); margin-top: 3px; }

/* ═══════════════════════════════════════════════════════
   HÉCTOR — TABLE
   ═══════════════════════════════════════════════════════ */
.tbl-wrap {
  overflow-x: auto; overflow-y: auto;
  flex: 1;
}

.cob-tbl {
  width: 100%; border-collapse: collapse;
  min-width: 500px;
}

.cob-tbl thead th {
  position: sticky; top: 0; z-index: 10;
  background: #060E17;
  padding: 9px 14px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--t3);
  border-bottom: 1px solid var(--bdr);
  text-align: left; cursor: pointer; user-select: none;
  white-space: nowrap;
  transition: color 0.1s;
}

.cob-tbl thead th:hover { color: var(--t2); }
.cob-tbl thead th.s { color: var(--t1); }

.cob-tbl tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.1s;
}

.cob-tbl tbody tr:hover { background: rgba(255,255,255,0.025); }

.cob-tbl td {
  padding: 9px 14px;
  vertical-align: middle;
}

.sem-cell { display: flex; align-items: center; gap: 8px; }

.sem-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sem-dot.vd { background: #00B451; box-shadow: 0 0 7px rgba(0,180,81,0.5); }
.sem-dot.am { background: #F59E0B; box-shadow: 0 0 7px rgba(245,158,11,0.5); }
.sem-dot.na { background: #F97316; box-shadow: 0 0 7px rgba(249,115,22,0.5); }
.sem-dot.ro { background: #EF4444; box-shadow: 0 0 7px rgba(239,68,68,0.55); }
.sem-dot.ne { background: #6B7280; }

.sem-lbl { font-size: 10.5px; color: var(--t3); white-space: nowrap; }

.c-name { font-size: 12px; font-weight: 600; color: var(--t1); }
.c-folios { font-size: 10px; color: var(--t3); font-family: var(--mono); margin-top: 1px; }

.d-num { font-family: var(--mono); font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.d-v { color: #00B451; } .d-a { color: #F59E0B; }
.d-n { color: #F97316; } .d-r { color: #EF4444; } .d-b { color: #9CA3AF; }

.m-num { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--t1); font-variant-numeric: tabular-nums; }

.g-mini { font-size: 11px; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
.g-fecha { font-size: 10px; color: var(--t3); font-family: var(--mono); margin-top: 1px; }

.row-acts { display: flex; gap: 4px; flex-wrap: wrap; }

/* ═══════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════ */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  z-index: 500;
  align-items: center; justify-content: center;
}

.modal-bg.open { display: flex; }

.modal-box {
  background: #0D2034;
  border: 1px solid var(--bdr2);
  border-radius: 12px;
  padding: 22px;
  width: 100%; max-width: 530px;
  max-height: 82vh; overflow-y: auto;
  box-shadow: 0 28px 90px rgba(0,0,0,0.55);
}

.modal-title {
  font-size: 14px; font-weight: 800;
  color: var(--t1);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
}

.modal-x {
  margin-left: auto; background: none; border: none;
  color: var(--t3); cursor: pointer; font-size: 17px;
  line-height: 1; padding: 2px;
  transition: color 0.1s; font-family: inherit;
}

.modal-x:hover { color: var(--t1); }

.m-sec { margin-bottom: 14px; }

.m-lbl {
  font-size: 9.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--t3); margin-bottom: 7px;
}

.m-row {
  display: flex; justify-content: space-between;
  align-items: center; gap: 12px;
  padding: 7px 11px;
  background: var(--card);
  border: 1px solid var(--bdr); border-radius: 6px;
  margin-bottom: 5px; font-size: 11.5px;
}

.m-row-id { font-family: var(--mono); font-weight: 600; color: var(--t1); }
.m-row-cl { color: var(--t2); flex: 1; }
.m-row-al { font-size: 10.5px; font-weight: 700; }

.tpl-box {
  background: var(--card);
  border: 1px solid rgba(0,180,81,0.2);
  border-radius: 7px; padding: 13px;
  font-size: 11.5px; line-height: 1.75;
  color: var(--t2);
  white-space: pre-wrap;
  font-family: var(--sans);
}

.modal-footer {
  margin-top: 18px;
  display: flex; gap: 8px; justify-content: flex-end;
}

.radio-grp { display: flex; flex-direction: column; gap: 7px; }

.radio-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; cursor: pointer; color: var(--t2);
  transition: color 0.1s;
}

.radio-row:hover { color: var(--t1); }

.modal-ta {
  width: 100%; background: var(--card);
  border: 1px solid var(--bdr2); border-radius: 6px;
  padding: 10px; color: var(--t1);
  font-size: 12px; font-family: inherit;
  resize: vertical; min-height: 72px; outline: none;
  transition: border-color 0.12s;
}

// ══════════════════════════════════════════════════════════════
// NOA — RENDER
// ══════════════════════════════════════════════════════════════
function renderNOA() {
  var cr = folios.filter(function(f) { return f.alerta === 'CRITICO'; });
  var at = folios.filter(function(f) { return f.alerta === 'ATENCION'; });
  var no = folios.filter(function(f) { return f.alerta === 'NORMAL'; });

  document.getElementById('noa-chips').innerHTML =
    '<span class="chip chip-r">● ' + cr.length + ' CRÍTICO</span>' +
    '<span class="chip chip-o">● ' + at.length + ' ATENCIÓN</span>' +
    '<span class="chip chip-g">● ' + no.length + ' NORMAL</span>';

  var badge = document.getElementById('badge');
  var badgeText = document.getElementById('badge-text');
  if (cr.length === 0) {
    badge.className = 'hdr-badge ok';
    badgeText.textContent = 'Sin alertas críticas';
  } else {
    badge.className = 'hdr-badge';
    badgeText.textContent = cr.length + ' alerta' + (cr.length > 1 ? 's' : '') + ' crítica' + (cr.length > 1 ? 's' : '');
  }

  var banner = document.getElementById('crit-banner');
  if (cr.length === 0) {
    banner.style.display = 'none';
  } else {
    banner.style.display = 'flex';
    document.getElementById('crit-title').textContent =
      cr.length + ' UNIDAD' + (cr.length > 1 ? 'ES' : '') + ' EN ESTADO CRÍTICO — ATENCIÓN INMEDIATA';
    document.getElementById('crit-detail').textContent =
      cr.map(function(f) { return f.id + ': ' + (f.incidencia || 'sin barrido'); }).join('  ·  ');
  }

  var html = '';
  if (cr.length) { html += secSep('⚠', 'CRÍTICO') + '<div class="cards">' + cr.map(cardHTML).join('') + '</div>'; }
  if (at.length) { html += secSep('△', 'ATENCIÓN') + '<div class="cards">' + at.map(cardHTML).join('') + '</div>'; }
  if (no.length) { html += secSep('✓', 'NORMAL') + '<div class="cards">' + no.map(cardHTML).join('') + '</div>'; }

  document.getElementById('noa-content').innerHTML = html;
}

function secSep(icon, text) {
  return '<div class="sec-sep">' + icon + ' ' + text + '</div>';
}

function cardHTML(f) {
  var tc = f.min > 45 ? 'tmr-cr' : f.min > 30 ? 'tmr-w' : 'tmr-ok';
  var eMap = { EN_TRANSITO: ['bdg-tr','En Tránsito'], EN_CARGA: ['bdg-ca','En Carga'], EN_DESTINO: ['bdg-de','En Destino'], INCIDENCIA: ['bdg-in','Incidencia'] };
  var ep = eMap[f.estatus] || ['bdg-tr', f.estatus];
  var ac = 'bdg-' + f.alerta.toLowerCase().substring(0,2);

  var escHTML = '';
  if (f.alerta === 'CRITICO' && f.esc.length) {
    var stLbl = { sr: 'Sin respuesta', ok: 'Contactado', act: 'Escalado ↑', pd: 'Pendiente' };
    var steps = f.esc.map(function(s) {
      return '<div class="esc-step">' +
        '<div class="esc-dot ' + s.st + '"></div>' +
        '<div class="esc-nivel">' + s.nivel + '</div>' +
        '<div class="esc-hora">' + s.hora + '</div>' +
        '<div class="esc-st ' + s.st + '">' + (stLbl[s.st] || s.st) + '</div>' +
      '</div>';
    }).join('');

    escHTML = '<div class="esc">' +
      '<div class="esc-hdr">↑ Log de escalación</div>' +
      '<div class="esc-steps">' + steps + '</div>' +
      '<div class="esc-acts">' +
        '<button class="btn btn-sm btn-g" onclick="resolverFolio(\'' + f.id + '\')">✓ Marcar resuelto</button>' +
        '<button class="btn btn-sm" onclick="toast(\'Escalando ' + f.id + ' a Coordinador Regional\', \'#F97316\')">↑ Escalar</button>' +
      '</div>' +
    '</div>';
  }

  return '<div class="fc ' + f.alerta.substring(0,2).toLowerCase() + '">' +
    '<div class="fc-top">' +
      '<div>' +
        '<div><span class="fc-id">' + f.id + '</span><span class="fc-placa"> · ' + f.placa + '</span></div>' +
        '<div class="fc-cliente">' + f.cliente + '</div>' +
        '<div class="fc-ruta">' + f.origen + ' <span style="color:var(--t3)">→</span> ' + f.destino + '</div>' +
      '</div>' +
      '<div class="fc-badges">' +
        '<span class="bdg ' + ep[0] + '">' + ep[1] + '</span>' +
        '<span class="bdg ' + ac + '">' + f.alerta + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="fc-meta">' +
      '<div class="kv"><span class="kv-k">Barrido:</span><span class="tmr ' + tc + '">' + f.min + ' min</span></div>' +
      '<div class="kv"><span class="kv-k">Op.:</span><span class="kv-v">' + f.operador + '</span></div>' +
      '<div class="kv"><span class="kv-k">Prov.:</span><span class="kv-v">' + f.proveedor + '</span></div>' +
      (f.zona ? '<span class="riesgo-pill">⚠ Zona riesgo</span>' : '') +

    '</div>' +
    (f.incidencia ? '<div class="fc-inc">⚠ ' + f.incidencia + '</div>' : '') +

}

function renderKPIs() {
  var total   = cuentas.reduce(function(s,c) { return s + c.monto; }, 0);
  var vencido = cuentas.filter(function(c) { return ['na','ro','ne'].indexOf(c.sem) > -1; }).reduce(function(s,c) { return s + c.monto; }, 0);
  var riesgo  = cuentas.filter(function(c) { return ['ro','ne'].indexOf(c.sem) > -1; }).reduce(function(s,c) { return s + c.monto; }, 0);
  var pct = total ? Math.round(riesgo / total * 100) : 0;

  document.getElementById('kpi-bar').innerHTML =
    '<div class="kpi-card"><div class="kpi-lbl">Cartera Total</div><div class="kpi-val" style="color:#60a5fa">' + mxn(total) + '</div><div class="kpi-sub">' + cuentas.length + ' clientes</div></div>' +
    '<div class="kpi-card"><div class="kpi-lbl">Cartera Vencida</div><div class="kpi-val" style="color:#F97316">' + mxn(vencido) + '</div><div class="kpi-sub">' + cuentas.filter(function(c){ return c.dias > 5; }).length + ' cuentas &gt;5 días</div></div>' +
    '<div class="kpi-card"><div class="kpi-lbl">Monto en Riesgo</div><div class="kpi-val" style="color:#EF4444">' + mxn(riesgo) + '</div><div class="kpi-sub">' + pct + '% del total · 🔴+⚫</div></div>';
}

function renderTable() {
  var sorted = cuentas.slice().sort(function(a, b) {
    if (sortField === 'semaforo') {
      return sortDir === 'desc' ? SEM_CFG[b.sem].ord - SEM_CFG[a.sem].ord : SEM_CFG[a.sem].ord - SEM_CFG[b.sem].ord;
    } else if (sortField === 'cliente') {
      return sortDir === 'asc' ? a.cliente.localeCompare(b.cliente) : b.cliente.localeCompare(a.cliente);
    } else {
      var va = a[sortField], vb = b[sortField];
      return sortDir === 'desc' ? vb - va : va - vb;
    }
  });

  document.getElementById('cob-body').innerHTML = sorted.map(function(c) {
    var s = SEM_CFG[c.sem];
    var emojis = { vd: '🟢', am: '🟡', na: '🟠', ro: '🔴', ne: '⚫' };

    if (c.sem === 'na') acts += ' <button class="btn btn-sm" style="color:#F97316;border-color:rgba(249,115,22,0.3);background:var(--orange-d);" onclick="openPlantilla(\'' + esc(c.cliente) + '\',\'formal\')">✉ Formal</button>';
    if (c.sem === 'ne') acts += ' <button class="btn btn-sm" style="color:#9CA3AF;border-color:rgba(107,114,128,0.3);">⚖ Legal</button>';

    return '<tr>' +
      '<td><div class="sem-cell"><div class="sem-dot ' + c.sem + '"></div><span class="sem-lbl">' + s.lbl + '</span></div></td>' +
      '<td><div class="c-name">' + c.cliente + '</div><div class="c-folios">' + c.folios.join(' · ') + '</div></td>' +
      '<td><span class="d-num ' + s.dcls + '">' + c.dias + 'd</span></td>' +
      '<td><span class="m-num">' + mxn(c.monto) + '</span></td>' +
      '<td><div class="g-mini">' + c.ult + '</div><div class="g-fecha">' + c.fecha + '</div></td>' +
      '<td><div class="row-acts">' + acts + '</div></td>' +
    '</tr>';
  }).join('');
}

// ══════════════════════════════════════════════════════════════
function resolverFolio(id) {
  var f = folios.find(function(x) { return x.id === id; });
  if (!f) return;
  f.alerta = 'NORMAL'; f.incidencia = null; f.zona = false; f.esc = [];
  renderNOA();
  toast('Folio ' + id + ' marcado como resuelto', '#00B451');
}

function simBarrido() {
  // Producción: POST /api/gps/barrido → actualiza posición y minSinBarrido en DB
  folios.forEach(function(f) {
    var r = Math.floor(Math.random() * 10) + 5;
    f.min = Math.max(2, f.min - r);
    if (f.min <= 30 && f.alerta === 'ATENCION' && !f.zona) f.alerta = 'NORMAL';
  });
  renderNOA();
  toast('Barrido GPS completado — posiciones actualizadas', '#00B451');
}

function openTurno() {
  var cr = folios.filter(function(f) { return f.alerta === 'CRITICO'; });
  var at = folios.filter(function(f) { return f.alerta === 'ATENCION'; });
  var no = folios.filter(function(f) { return f.alerta === 'NORMAL'; });
  var now = new Date();
  var hora  = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  var fecha = now.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });

  function secRows(items, color, fn) {
    if (!items.length) return '';
    return '<div class="m-sec"><div class="m-lbl" style="color:' + color + '">' + fn.title + ' (' + items.length + ')</div>' +
      items.map(fn.row).join('') + '</div>';
  }

  var resumen =
    'Entrega de turno ' + hora + ' — ' + fecha + '\n\n' +
    'FOLIOS ACTIVOS: ' + folios.length + ' total\n' +
    '• CRÍTICO:  ' + cr.length + '  (' + (cr.map(function(f){return f.id;}).join(', ') || 'ninguno') + ')\n' +
    '• ATENCIÓN: ' + at.length + ' (' + (at.map(function(f){return f.id;}).join(', ') || 'ninguno') + ')\n' +
    '• NORMAL:   ' + no.length + '\n\n' +
    cr.map(function(f){ return '⚠ ' + f.id + ' — ' + f.cliente + ': ' + f.incidencia; }).join('\n') +
    '\n\nPróximo barrido: en 30 min.\nGenerado por NOA · ABSTORAGES AI Ops Center';

  var html =
    (cr.length ? '<div class="m-sec"><div class="m-lbl" style="color:#EF4444">⚠ CRÍTICOS (' + cr.length + ')</div>' +
      cr.map(function(f){ return '<div class="m-row"><span class="m-row-id">' + f.id + '</span><span class="m-row-cl">' + f.cliente + '</span><span class="m-row-al" style="color:#EF4444">' + (f.incidencia || 'CRÍTICO') + '</span></div>'; }).join('') + '</div>' : '') +
    (at.length ? '<div class="m-sec"><div class="m-lbl" style="color:#F97316">△ ATENCIÓN (' + at.length + ')</div>' +
      at.map(function(f){ return '<div class="m-row"><span class="m-row-id">' + f.id + '</span><span class="m-row-cl">' + f.cliente + ' · ' + f.origen + ' → ' + f.destino + '</span><span class="m-row-al" style="color:#F97316">' + f.min + ' min</span></div>'; }).join('') + '</div>' : '') +
    (no.length ? '<div class="m-sec"><div class="m-lbl" style="color:#00B451">✓ NORMALES (' + no.length + ')</div>' +
      no.map(function(f){ return '<div class="m-row"><span class="m-row-id">' + f.id + '</span><span class="m-row-cl">' + f.cliente + ' · ' + f.estatus + '</span></div>'; }).join('') + '</div>' : '') +
    '<div class="m-sec"><div class="m-lbl">Resumen para entregar</div><div class="tpl-box">' + resumen + '</div></div>';

  document.getElementById('turno-body').innerHTML = html;
  document.getElementById('turno-modal').classList.add('open');
}

function closeTurno() { document.getElementById('turno-modal').classList.remove('open'); }
function confirmTurno() { closeTurno(); toast('Entrega de turno confirmada y enviada al monitorista entrante', '#00B451'); }

// ══════════════════════════════════════════════════════════════
// HÉCTOR ACTIONS
// ══════════════════════════════════════════════════════════════
function sortBy(field) {
  if (sortField === field) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortField = field; sortDir = 'desc'; }
  document.getElementById('sort-btn').textContent = cap(field) + ' ' + (sortDir === 'desc' ? '↓' : '↑');
  renderTable();
}

function cycleSort() {
  var fields = ['dias', 'monto', 'semaforo', 'cliente'];
  sortField = fields[(fields.indexOf(sortField) + 1) % fields.length];
  sortDir = 'desc';
  document.getElementById('sort-btn').textContent = cap(sortField) + ' ↓';
  renderTable();
}

function openPlantilla(cliente, tipo) {
  var c = cuentas.find(function(x) { return x.cliente === cliente; });
  if (!c) return;
  var txt = tipo === 'cortesia'
    ? 'Buenos días,\n\nLe escribimos de ABSTORAGES Logistics Solutions para recordarle cortésmente la factura(s) ' + c.folios.join(', ') + ' con saldo de ' + mxn(c.monto) + ' próxima a vencer.\n\nSi ya realizó el pago, ignore este mensaje.\n\nAtentamente,\nAdministración · ABSTORAGES Logistics Solutions\nTel: (81) 8888-0000'
    : 'Estimados ' + c.cliente + ',\n\nABSTORAGES Logistics Solutions les informa que existe una cuenta vencida de ' + mxn(c.monto) + ' correspondiente a los servicios ' + c.folios.join(', ') + ', con ' + c.dias + ' días de atraso.\n\nSolicitamos regularizar su situación en 5 días hábiles, de lo contrario el caso será escalado a nuestra Dirección General.\n\nAtentamente,\nAdministración Financiera · ABSTORAGES Logistics Solutions\n\n// Conectar a: WhatsApp Business API (360dialog) POST /api/wa/send';

  gClient = cliente;
  document.getElementById('gestion-body').innerHTML =
    '<div class="m-sec">' +
      '<div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;">' + c.cliente + '</div>' +
      '<div style="font-size:11px;color:var(--t3);">' + c.folios.join(', ') + ' · ' + mxn(c.monto) + ' · ' + c.dias + ' días vencido</div>' +
    '</div>' +
    '<div class="m-sec">' +
      '<div class="m-lbl">Plantilla generada por HÉCTOR — ' + (tipo === 'cortesia' ? 'Cortesía' : 'Formal') + '</div>' +
      '<div class="tpl-box">' + txt + '</div>' +
      '<div style="margin-top:8px;font-size:10.5px;color:var(--t3);">Envío vía: <span style="color:#25D366;font-weight:700;">WhatsApp Business</span> · <span style="color:#60a5fa;font-weight:700;">Correo Electrónico</span></div>' +
    '</div>';

  document.getElementById('gestion-modal').classList.add('open');
}

function openGestion(cliente) {
  var c = cuentas.find(function(x) { return x.cliente === cliente; });
  if (!c) return;
  gClient = cliente;

  document.getElementById('gestion-body').innerHTML =
    '<div class="m-sec">' +
      '<div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;">' + c.cliente + '</div>' +
      '<div style="font-size:11px;color:var(--t3);">' + c.folios.join(', ') + ' · ' + mxn(c.monto) + ' · ' + c.dias + 'd · Resp: ' + c.resp + '</div>' +
    '</div>' +
    '<div class="m-sec">' +
      '<div class="m-lbl">Tipo de gestión</div>' +
      '<div class="radio-grp">' +
        '<label class="radio-row"><input type="radio" name="gt" value="llamada" checked> Llamada telefónica</label>' +
        '<label class="radio-row"><input type="radio" name="gt" value="correo"> Correo electrónico</label>' +
        '<label class="radio-row"><input type="radio" name="gt" value="visita"> Visita presencial</label>' +
        '<label class="radio-row"><input type="radio" name="gt" value="pago"> Pago recibido</label>' +
        '<label class="radio-row"><input type="radio" name="gt" value="acuerdo"> Acuerdo de pago</label>' +
      '</div>' +
    '</div>' +
    '<div class="m-sec">' +
      '<div class="m-lbl">Notas</div>' +
      '<textarea class="modal-ta" id="gnotas" placeholder="Describe el resultado de la gestión…"></textarea>' +
    '</div>';

  document.getElementById('gestion-modal').classList.add('open');
}

function closeGestion() { document.getElementById('gestion-modal').classList.remove('open'); gClient = null; }

function confirmGestion() {
  if (gClient) {
    var c = cuentas.find(function(x) { return x.cliente === gClient; });
    if (c) {
      var sel = document.querySelector('input[name="gt"]:checked');
      c.ult = (sel ? cap(sel.value) : 'Gestión') + ' registrada';
      c.fecha = new Date().toISOString().split('T')[0];
    }
    toast('Gestión registrada para ' + gClient, '#00B451');
  }
  closeGestion();
  renderTable();
}

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function mxn(n) {
  return n.toLocaleString('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 });
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function esc(s) { return s.replace(/'/g, "\\'"); }

function toast(msg, color) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeft = '3px solid ' + color;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3200);
}

// ══════════════════════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-MX', { hour12: false }) + '  ·  ' +
    new Date().toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ══════════════════════════════════════════════════════════════
// SIMULATED TIMER
// Producción: reemplazar con SSE/WebSocket del servidor GPS
// Cron real: node backend/crons/barrido.js (cada 30 min, actualiza DB)
// ══════════════════════════════════════════════════════════════
function tick() {
  simTick++;
  if (simTick % 10 === 0) {
    folios.forEach(function(f) {
      if (f.estatus === 'EN_TRANSITO' || f.estatus === 'EN_CARGA') {
        f.min += 1;
        if (f.min > 30 && f.alerta === 'NORMAL') f.alerta = 'ATENCION';
      }
    });
    renderNOA();
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(tick, 5000);

  renderNOA();
  renderHECTOR();

  ['turno-modal','gestion-modal'].forEach(function(id) {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeTurno(); closeGestion(); }
  });
});
</script>
