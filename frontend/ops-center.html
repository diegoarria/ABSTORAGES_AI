<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSTORAGES · AI Ops Center</title>
<style>
:root {
  --bg:   #04080F;
  --s1:   #070E1B;
  --s2:   #091626;
  --s3:   #0D1E35;
  --s3h:  #112540;
  --s4:   #142C48;
  --grn:  #00B451;
  --grn-d:rgba(0,180,81,0.09);
  --grn-b:rgba(0,180,81,0.22);
  --crit: #FF3A3A;
  --cr-d: rgba(255,58,58,0.08);
  --cr-b: rgba(255,58,58,0.22);
  --warn: #FF8C00;
  --wn-d: rgba(255,140,0,0.08);
  --wn-b: rgba(255,140,0,0.2);
  --sv:#00B451; --sa:#F5C400; --sn:#FF8C00; --sr:#FF3A3A; --sb:#5E7A8C;
  --t1:#D4E8F8; --t2:#5E85A0; --t3:#2E4A5E;
  --b1:rgba(255,255,255,0.05); --b2:rgba(255,255,255,0.09); --b3:rgba(255,255,255,0.15);
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Consolas',monospace;
  --r:7px; --rl:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── HEADER ── */
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 18px;flex-shrink:0;z-index:200;gap:0}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit}
.hdr-sep{width:1px;height:20px;background:var(--b2);margin:0 16px}
.hdr-nav{display:flex;gap:2px}
.np{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;background:none;color:var(--t2);letter-spacing:.03em;transition:color .15s,background .15s;font-family:inherit}
.np:hover{color:var(--t1);background:var(--b1)}
.np.on{background:var(--grn-d);border-color:var(--grn-b);color:var(--grn)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.hdr-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
.hdr-badge.crit{background:var(--cr-d);border:1px solid var(--cr-b);color:var(--crit)}
.hdr-badge.safe{background:var(--grn-d);border:1px solid var(--grn-b);color:var(--grn)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-clock{font-family:var(--mono);font-size:11px;color:var(--t2);letter-spacing:.06em;font-variant-numeric:tabular-nums}

/* ── WORKSPACE ── */
.workspace{display:flex;height:calc(100vh - 52px);overflow:hidden}
.panel{display:flex;flex-direction:column;min-height:0}
.panel-noa{flex:6;border-right:1px solid var(--b1);position:relative}
.panel-hec{flex:4}

/* ── PANEL HEADS ── */
.phead{height:48px;display:flex;align-items:center;padding:0 16px;gap:9px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0}
.adot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.adot.noa{background:var(--cr-d) url('/img/noa-avatar.png') center/cover no-repeat;color:transparent;border:1px solid var(--cr-b)}
.adot.hec{background:var(--grn-d) url('/img/hector-avatar.png') center/cover no-repeat;color:transparent;border:1px solid var(--grn-b)}
.aname{font-size:12.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.aname.noa{color:var(--crit)}.aname.hec{color:var(--grn)}
.arole{font-size:10.5px;color:var(--t3);padding-left:7px;border-left:1px solid var(--b2);margin-left:4px}
.pchips{display:flex;gap:5px}
.chip{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.04em}
.ch-r{background:var(--cr-d);color:var(--crit);border:1px solid var(--cr-b)}
.ch-o{background:var(--wn-d);color:var(--warn);border:1px solid var(--wn-b)}
.ch-g{background:var(--grn-d);color:var(--grn);border:1px solid var(--grn-b)}
.pbtns{margin-left:auto;display:flex;gap:6px}

/* ── BUTTONS ── */
.btn{padding:5px 11px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b3);background:var(--b1);color:var(--t2);letter-spacing:.02em;transition:background .15s,color .15s,border-color .15s;font-family:inherit}
.btn:hover{background:var(--b2);color:var(--t1)}
.btn:focus-visible{outline:2px solid var(--grn);outline-offset:2px}
.btn-g{background:var(--grn);color:#fff;border-color:transparent}
.btn-g:hover{background:#00a040}
.btn-r{background:var(--cr-d);color:var(--crit);border-color:var(--cr-b)}
.btn-r:hover{background:rgba(255,58,58,.15)}
.btn-sm{padding:3px 9px;font-size:10.5px;border-radius:5px}

/* ── CRITICAL BANNER ── */
.crit-banner{display:flex;align-items:flex-start;gap:12px;padding:10px 18px;background:rgba(255,58,58,.055);border-bottom:1px solid rgba(255,58,58,.15);flex-shrink:0}
.crit-pulse{width:10px;height:10px;border-radius:50%;background:var(--crit);flex-shrink:0;margin-top:3px;animation:ring 1.6s ease-out infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(255,58,58,.5)}70%{box-shadow:0 0 0 7px rgba(255,58,58,0)}100%{box-shadow:0 0 0 0 rgba(255,58,58,0)}}
.crit-main{font-size:11.5px;font-weight:700;color:var(--crit);letter-spacing:.04em}
.crit-sub{font-size:10.5px;color:rgba(255,58,58,.5);margin-top:1px}

/* ── FILTER BAR — UX: permite filtrar en 1 clic sin scrollear ── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0}
.search-inp{flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:6px;padding:5px 10px;color:var(--t1);font-size:11.5px;font-family:inherit;outline:none;transition:border-color .15s;min-width:0}
.search-inp::placeholder{color:var(--t3)}
.search-inp:focus{border-color:var(--grn-b)}
.search-inp:focus-visible{outline:none}
.fchips{display:flex;gap:4px;flex-shrink:0}
.fchip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em;cursor:pointer;border:1px solid var(--b1);background:none;color:var(--t3);font-family:inherit;transition:all .15s;white-space:nowrap}
.fchip:hover{color:var(--t2);border-color:var(--b2)}
.fchip:focus-visible{outline:2px solid var(--grn);outline-offset:2px}
/* UX: chips activos con color de semáforo correspondiente para scan rápido */
.fchip.on{background:var(--b2);color:var(--t1);border-color:var(--b3)}
.fchip.on.fch-all{background:var(--b2);color:var(--t1);border-color:var(--b3)}
.fchip.on.fch-r{background:var(--cr-d);color:var(--crit);border-color:var(--cr-b)}
.fchip.on.fch-o{background:var(--wn-d);color:var(--warn);border-color:var(--wn-b)}
.fchip.on.fch-g{background:var(--grn-d);color:var(--grn);border-color:var(--grn-b)}
.fchip.on.fvd{background:rgba(0,180,81,.1);color:var(--sv);border-color:rgba(0,180,81,.28)}
.fchip.on.fam{background:rgba(245,196,0,.1);color:var(--sa);border-color:rgba(245,196,0,.28)}
.fchip.on.fna{background:rgba(255,140,0,.1);color:var(--sn);border-color:rgba(255,140,0,.28)}
.fchip.on.fro{background:rgba(255,58,58,.1);color:var(--sr);border-color:rgba(255,58,58,.28)}
.fchip.on.fne{background:rgba(94,122,140,.1);color:var(--sb);border-color:rgba(94,122,140,.28)}

/* ── EMPTY STATE — UX: comunica "sin resultados" vs "error" ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--t3);text-align:center;gap:8px}
.empty-icon{font-size:26px;opacity:.35}
.empty-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.empty-sub{font-size:10.5px;opacity:.6;max-width:200px}

/* ── NOA PANEL BODY ── */
.pbody{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--s2)}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px 5px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t3)}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--b1)}
.cards{padding:0 12px 8px;display:flex;flex-direction:column;gap:7px}

/* ── FOLIO CARDS ── */
.fc{background:var(--s3);border-radius:var(--rl);overflow:hidden;border:1px solid transparent;transition:background .15s,box-shadow .3s,border-color .3s}
.fc:hover{background:var(--s3h)}
/* UX: intensidad crítica escalada por tiempo — var(--ci) se actualiza via JS cada tick */
.fc.cr{
  border-color:rgba(255,58,58,calc(.12 + var(--ci,0) * .28));
  box-shadow:0 0 0 1px rgba(255,58,58,calc(.04 + var(--ci,0)*.1)),
             0 4px 24px rgba(255,58,58,calc(.06 + var(--ci,0)*.22));
}
.fc.at{border-color:rgba(255,140,0,.14)}
.fc.no .fc-line{background:var(--b1)}
.fc-line{height:2px}
.fc.cr .fc-line{background:var(--crit)}
.fc.at .fc-line{background:var(--warn)}

/* ── Compact NORMAL card ── */
.fc.no .fc-body{display:flex;align-items:center;gap:12px;padding:10px 14px}
.cpt-l{min-width:0;flex:1}
.cpt-r{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Expanded card body ── */
.fc-body{padding:12px 14px 0}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.fc-id{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--t1);letter-spacing:.04em}
.fc-unit{font-size:9.5px;color:var(--t3);margin-left:5px}
.fc-cl{font-size:11.5px;color:var(--t2);margin-top:1px}
.fc-rt{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--t3);margin-top:2px}
.fc-bdgs{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.bdg{padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bdg-tr{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.18)}
.bdg-ca{background:rgba(245,196,0,.1);color:#F5C400;border:1px solid rgba(245,196,0,.2)}
.bdg-de{background:var(--grn-d);color:var(--grn);border:1px solid var(--grn-b)}
.bdg-in,.bdg-cr{background:var(--cr-d);color:var(--crit);border:1px solid var(--cr-b)}
.bdg-at{background:var(--wn-d);color:var(--warn);border:1px solid var(--wn-b)}
.bdg-no{background:var(--grn-d);color:var(--grn);border:1px solid var(--grn-b)}

/* ── SLA Sweep bar ── */
.sw-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sw-lbl{font-size:9.5px;color:var(--t3);flex-shrink:0;width:60px}
.sw-track{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden}
.sw-fill{height:100%;border-radius:2px;transition:width .4s,background .3s}
.sw-fill.ok{background:var(--grn)}
.sw-fill.wn{background:var(--warn)}
/* UX: barra crítica pulsa solo cuando supera el 100% — no distrae antes */
.sw-fill.ov{background:var(--crit);animation:fpulse 1s ease infinite}
@keyframes fpulse{0%,100%{opacity:1}50%{opacity:.45}}
.sw-time{font-family:var(--mono);font-size:10.5px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums}
.sw-time.ok{color:var(--grn)}.sw-time.wn{color:var(--warn)}.sw-time.ov{color:var(--crit)}

/* ── Card meta row ── */
.fc-meta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:9px}
.mkv{display:flex;align-items:center;gap:4px;font-size:10.5px}
.mk{color:var(--t3)}.mv{color:var(--t2);font-weight:500}
.mmono{font-family:var(--mono);font-size:10px}
.zona-tag{margin-left:auto;font-size:9.5px;font-weight:800;color:var(--crit);text-transform:uppercase;letter-spacing:.06em;background:var(--cr-d);border:1px solid var(--cr-b);padding:2px 7px;border-radius:4px;flex-shrink:0}
.fc-inc{font-size:10.5px;color:rgba(255,58,58,.7);background:rgba(255,58,58,.05);border:1px solid rgba(255,58,58,.12);border-radius:5px;padding:5px 10px;margin-bottom:10px}

/* ── Escalation timeline ── */
.esc-hdr{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--crit);margin-bottom:9px}
.esc-steps{position:relative}
.esc-step{display:flex;align-items:flex-start;gap:10px;padding-bottom:9px;position:relative}
.esc-step:not(:last-child)::after{content:'';position:absolute;left:4px;top:13px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--b2),transparent)}
.esc-nd{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;position:relative;z-index:1}
.esc-nd.sr{background:var(--crit)}
.esc-nd.ok{background:var(--grn)}
.esc-nd.act{background:var(--warn);animation:blink .9s ease infinite}
.esc-nd.pd{background:transparent;border:1px solid var(--b3)}
.esc-info{flex:1}
.esc-nv{font-size:11px;font-weight:600;color:var(--t2)}
.esc-h{font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:5px}
.esc-st{font-size:10px;font-weight:700;margin-top:1px}
.esc-st.sr{color:var(--crit)}.esc-st.ok{color:var(--grn)}.esc-st.act{color:var(--warn)}.esc-st.pd{color:var(--t3)}
.fc-acts{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--b1);background:rgba(0,0,0,.15)}

/* ── AUTO-REFRESH LABEL ── */
.barrido-lbl{font-size:9px;color:var(--t3);font-family:var(--mono);white-space:nowrap;margin-left:2px;transition:color .2s}
.barrido-lbl.pronto{color:var(--warn)}

/* ── FOLIO DETAIL PANEL ── */
.fd-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;background:var(--s1);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);pointer-events:none}
.fd-overlay.open{transform:translateX(0);pointer-events:all}
.fd-head{height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s2)}
.fd-back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:5px;line-height:1;display:flex;align-items:center;transition:background .13s}
.fd-back:hover{background:var(--b1)}
.fd-folio{font-size:12.5px;font-weight:800;font-family:var(--mono);color:var(--crit);letter-spacing:.03em;flex:1}
.fd-st-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;padding:3px 8px;border-radius:20px}
.fd-body{flex:1;overflow-y:auto;padding:14px 14px 24px}
.fd-sec{margin-bottom:18px}
.fd-sec-ttl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.13em;color:var(--t3);border-bottom:1px solid var(--b1);padding-bottom:6px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.fd-sec-ttl .fd-ico{font-size:11px;opacity:.7}
.fd-row{display:flex;gap:4px;margin-bottom:5px;font-size:12px;line-height:1.5}
.fd-k{color:var(--t3);font-size:11px;font-weight:600;min-width:110px;flex-shrink:0}
.fd-v{color:var(--t1);word-break:break-word;font-family:inherit}
.fd-v.mono{font-family:var(--mono);font-size:11px}
.fd-route{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--s2);border-radius:8px;border:1px solid var(--b1);margin-bottom:14px}
.fd-route-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.fd-route-or{background:var(--grn)}
.fd-route-de{background:var(--crit)}
.fd-route-col{flex:1}
.fd-route-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:1px}
.fd-route-city{font-size:12.5px;font-weight:700;color:var(--t1)}
.fd-route-addr{font-size:11px;color:var(--t2)}
.fd-route-arrow{color:var(--t3);font-size:18px;align-self:center;padding:0 4px}
.fd-ci-box{background:var(--s3);border:1px solid rgba(255,58,58,.25);border-radius:8px;padding:12px 14px;font-size:11.5px;line-height:1.7;color:var(--t1);white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.fd-link{color:var(--t2);text-decoration:underline;text-underline-offset:2px;font-size:11.5px}
.fd-link:hover{color:var(--crit)}
.fd-comment{font-size:11.5px;color:var(--warn);background:rgba(255,140,0,.07);border:1px solid rgba(255,140,0,.2);border-radius:6px;padding:8px 10px;line-height:1.6;margin-top:4px}
.fd-eta-box{border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:14px}
.fd-eta-box.eta-ok{background:rgba(0,180,81,.08);border:1px solid rgba(0,180,81,.25)}
.fd-eta-box.eta-risk{background:rgba(255,140,0,.08);border:1px solid rgba(255,140,0,.25)}
.fd-eta-box.eta-late{background:rgba(255,58,58,.08);border:1px solid rgba(255,58,58,.25)}
.fd-eta-box.eta-done{background:rgba(0,180,81,.06);border:1px solid rgba(0,180,81,.2)}
.fd-eta-ico{font-size:22px;line-height:1;margin-top:1px;flex-shrink:0}
.fd-eta-main{flex:1;min-width:0}
.fd-eta-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.fd-eta-label.eta-ok{color:var(--grn)}
.fd-eta-label.eta-risk{color:var(--warn)}
.fd-eta-label.eta-late{color:var(--crit)}
.fd-eta-label.eta-done{color:var(--grn)}
.fd-eta-time{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.02em;margin-bottom:3px}
.fd-eta-meta{font-size:11px;color:var(--t3);line-height:1.5}

/* ── NOA AI CHAT ── */
.noa-ai-foot{flex-shrink:0;border-top:1px solid var(--b1);background:var(--s1);display:flex;flex-direction:column;transition:flex .2s}
.noa-ai-foot.open{flex:0 0 52%;min-height:0}
.noa-ai-head{display:flex;align-items:center;padding:9px 14px;cursor:pointer;user-select:none;gap:8px;transition:background .15s;flex-shrink:0;border-bottom:1px solid transparent}
.noa-ai-head:hover{background:var(--b1)}
.noa-ai-foot.open .noa-ai-head{border-bottom-color:var(--b1)}
.noa-ai-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--crit);flex:1}
.noa-ai-hint{font-size:9.5px;color:var(--t3)}
.noa-ai-arr{font-size:9px;color:var(--t3);transition:transform .2s;display:inline-block}
.noa-ai-arr.open{transform:rotate(180deg)}

/* ── messages list ── */
.noa-msgs{flex:1;overflow-y:auto;padding:16px 14px;display:none;flex-direction:column;gap:16px;min-height:0;scroll-behavior:smooth}
.noa-msgs.open{display:flex}

/* ── message rows ── */
.nm{display:flex;align-items:flex-start;gap:9px;width:100%}
.nm.user{flex-direction:row-reverse}
.nm-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;margin-top:2px;background:var(--cr-d) url('/img/noa-avatar.png') center/cover no-repeat;border:1px solid var(--cr-b)}

/* ── bubbles ── */
.nm-bubble{padding:14px 16px;border-radius:14px;font-size:13px;line-height:1.72;word-break:break-word;min-width:0;flex:1}
.nm.noa  .nm-bubble{background:var(--s3);border:1px solid var(--b2);border-top-left-radius:3px;color:var(--t1);max-width:calc(100% - 35px)}
.nm.user .nm-bubble{background:rgba(255,58,58,.09);border:1px solid rgba(255,58,58,.18);border-top-right-radius:3px;color:var(--t1);max-width:82%;flex:0 0 auto}
.nm.noa.streaming .nm-bubble::after{content:'▋';animation:blink .8s step-end infinite;color:var(--crit);margin-left:1px}

/* ── markdown: paragraphs ── */
.nm-bubble p{margin:0 0 10px;color:var(--t1)}
.nm-bubble p:last-child{margin:0}

/* ── markdown: headers ── */
.nm-bubble h2{font-size:13.5px;font-weight:800;color:var(--crit);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(255,58,58,.2);letter-spacing:.01em;display:flex;align-items:center;gap:6px}
.nm-bubble h3{font-size:13px;font-weight:700;color:var(--t1);margin:14px 0 6px;padding-left:9px;border-left:2px solid var(--crit)}
.nm-bubble h4{font-size:12.5px;font-weight:700;color:var(--t2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.05em;font-size:10.5px}
.nm-bubble h2:first-child,.nm-bubble h3:first-child,.nm-bubble h4:first-child{margin-top:0}

/* ── markdown: emphasis ── */
.nm-bubble strong{color:var(--t1);font-weight:700;background:rgba(255,58,58,.08);padding:0 3px;border-radius:3px}
.nm-bubble em{color:var(--t2);font-style:italic}

/* ── markdown: divider ── */
.nm-bubble hr{border:none;height:1px;background:linear-gradient(to right,rgba(255,58,58,.3),var(--b2),transparent);margin:14px 0}

/* ── markdown: lists ── */
.nm-bubble ul{list-style:none;padding-left:0;margin:6px 0 10px}
.nm-bubble ul li{padding-left:16px;position:relative;margin-bottom:6px;color:var(--t1);line-height:1.6}
.nm-bubble ul li::before{content:'•';position:absolute;left:0;color:var(--crit);font-weight:700}
.nm-bubble ol{padding-left:20px;margin:6px 0 10px;counter-reset:li}
.nm-bubble ol li{margin-bottom:6px;color:var(--t1);line-height:1.6;padding-left:4px}
.nm-bubble ul:last-child,.nm-bubble ol:last-child{margin-bottom:0}

/* ── markdown: checkboxes ── */
.nm-bubble .cb-check{color:var(--grn);font-size:14px;line-height:1}
.nm-bubble .cb-empty{color:var(--t3);font-size:14px;line-height:1}

/* ── markdown: code ── */
.nm-bubble code{background:rgba(255,58,58,.08);border:1px solid rgba(255,58,58,.15);border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:11.5px;color:var(--crit)}
.nm-bubble pre{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 14px;overflow-x:auto;margin:10px 0}
.nm-bubble pre code{background:none;border:none;padding:0;font-size:11.5px;color:var(--t2)}

/* ── markdown: tables ── */
.nm-bubble table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px;border-radius:8px;overflow:hidden;border:1px solid var(--b2)}
.nm-bubble thead tr{background:rgba(255,58,58,.08)}
.nm-bubble th{padding:8px 12px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--crit);border-bottom:1px solid rgba(255,58,58,.2);white-space:nowrap}
.nm-bubble td{padding:8px 12px;border-bottom:1px solid var(--b1);color:var(--t1);vertical-align:top;line-height:1.5}
.nm-bubble tbody tr:last-child td{border-bottom:none}
.nm-bubble tbody tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.nm-bubble table:last-child{margin-bottom:0}

/* ── input area ── */
.noa-inp-area{display:none;gap:8px;padding:10px 14px;border-top:1px solid var(--b1);flex-shrink:0;align-items:flex-end;background:var(--s1)}
.noa-inp-area.open{display:flex}
.noa-inp-area .mta{flex:1;min-height:36px;max-height:90px;resize:none;font-size:12.5px;border-color:rgba(255,58,58,.25);line-height:1.5}
.noa-inp-area .mta:focus{border-color:rgba(255,58,58,.5);box-shadow:0 0 0 2px rgba(255,58,58,.07)}
.noa-inp-area .btn-r{flex-shrink:0;align-self:flex-end;padding:7px 16px;font-size:13px}

/* ── HÉCTOR KPI strip ── */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0}
.kpi-tile{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px}
.kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:5px}
.kpi-v{font-size:17px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.kpi-s{font-size:9.5px;color:var(--t3);margin-top:4px}

/* ── Cobranza table ── */
.tbl-wrap{flex:1;overflow:auto}
.cob-tbl{width:100%;border-collapse:collapse;min-width:460px}
/* UX: encabezados muestran flecha activa y cursor pointer para indicar que son ordenables */
.cob-tbl thead th{position:sticky;top:0;z-index:10;background:var(--s1);padding:8px 12px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);border-bottom:1px solid var(--b1);text-align:left;cursor:pointer;user-select:none;white-space:nowrap;transition:color .12s}
.cob-tbl thead th:hover{color:var(--t2)}
.cob-tbl thead th.s{color:var(--t1)}
.cob-tbl thead th .sort-arrow{font-size:9px;margin-left:3px;opacity:.7}
.cob-tbl tbody tr{border-bottom:1px solid rgba(255,255,255,.025);transition:background .12s}
.cob-tbl tbody tr:hover{background:var(--b1)}
.cob-tbl td{padding:9px 12px;vertical-align:middle}
.cob-tbl tbody tr td:first-child{border-left:3px solid var(--rc,var(--b2));padding-left:13px}
.sem-cell{display:flex;align-items:center;gap:7px}
.sem-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sem-dot.vd{background:var(--sv);box-shadow:0 0 6px rgba(0,180,81,.45)}
.sem-dot.am{background:var(--sa);box-shadow:0 0 6px rgba(245,196,0,.45)}
.sem-dot.na{background:var(--sn);box-shadow:0 0 6px rgba(255,140,0,.45)}
.sem-dot.ro{background:var(--sr);box-shadow:0 0 6px rgba(255,58,58,.5)}
.sem-dot.ne{background:var(--sb)}
.sem-lbl{font-size:10.5px;color:var(--t3);white-space:nowrap}
.cn{font-size:12px;font-weight:600;color:var(--t1)}
.cf{font-size:9.5px;color:var(--t3);font-family:var(--mono);margin-top:1px}
.d-cell{text-align:left}
.d-num{font-family:var(--mono);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;display:block}
.d-bar{height:2px;background:var(--b2);border-radius:1px;margin-top:3px;width:44px;overflow:hidden}
.d-fill{height:100%;border-radius:1px}
.mnt{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--t1);font-variant-numeric:tabular-nums}
.gl{font-size:10.5px;color:var(--t2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gd{font-size:9.5px;color:var(--t3);font-family:var(--mono);margin-top:1px}
.row-acts{display:flex;gap:4px}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:600;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--s4);border:1px solid var(--b3);border-radius:var(--rl);padding:22px;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 30px 100px rgba(0,0,0,.6)}
.mtitle{font-size:13.5px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mx{margin-left:auto;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;line-height:1;transition:color .15s;font-family:inherit}
.mx:hover{color:var(--t1)}
.mx:focus-visible{outline:2px solid var(--grn);outline-offset:2px}
.msec{margin-bottom:14px}
.mlbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--t3);margin-bottom:7px}
.mrow{display:flex;align-items:center;gap:10px;padding:7px 11px;background:var(--s3);border:1px solid var(--b1);border-radius:6px;margin-bottom:5px;font-size:11.5px}
.mid{font-family:var(--mono);font-weight:600;color:var(--t1)}
.mcl{color:var(--t2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mal{font-size:10px;font-weight:700;flex-shrink:0}
.tpl{background:var(--s3);border:1px solid var(--grn-b);border-radius:7px;padding:13px;font-size:11.5px;line-height:1.75;color:var(--t2);white-space:pre-wrap;font-family:var(--sans)}
.mfoot{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
.rgrp{display:flex;flex-direction:column;gap:7px}
.rrow{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;color:var(--t2)}
.rrow:hover{color:var(--t1)}
.mta{width:100%;background:var(--s3);border:1px solid var(--b3);border-radius:6px;padding:10px;color:var(--t1);font-size:12px;font-family:inherit;resize:vertical;min-height:70px;outline:none;transition:border-color .15s}
.mta:focus{border-color:var(--grn-b)}

/* ── HÉCTOR AI en modal ── */
.hec-stream{background:var(--s3);border:1px solid var(--grn-b);border-radius:7px;padding:13px;font-size:11.5px;line-height:1.75;color:var(--t2);min-height:54px;white-space:pre-wrap;font-family:var(--sans);position:relative}
.hec-stream.streaming::after{content:'▋';animation:blink .8s step-end infinite;color:var(--grn)}
.hec-ai-bar{display:flex;gap:6px;margin-top:7px;align-items:flex-start}
.hec-ai-bar .mta{flex:1;min-height:34px;resize:none;font-size:11.5px}
.hec-ai-bar .btn{flex-shrink:0;align-self:flex-end}

/* ── TOAST ── */
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--b3);border-radius:8px;padding:9px 16px;font-size:12px;font-weight:600;color:var(--t1);z-index:9999;animation:tup .2s ease;box-shadow:0 12px 40px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none}
</style>
</head>
<body>

<header class="hdr">
  <a href="/" class="brand">
    <div style="background:#fff;border-radius:7px;padding:3px 9px;display:flex;align-items:center;flex-shrink:0">
      <img src="/img/logo.png" alt="ABSTORAGES" style="height:26px;width:auto;display:block">
    </div>
    <span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.13em;color:var(--grn);padding-left:2px">AI Ops Center</span>
  </a>

  <div class="hdr-sep"></div>

  <nav class="hdr-nav" aria-label="Navegación principal">
    <button class="np on" aria-current="page">NOA · HÉCTOR</button>
    <button class="np" onclick="location.href='/'">SARA</button>
    <button class="np" onclick="location.href='/'">SOFÍA</button>
  </nav>

  <div class="hdr-right">
    <span class="hdr-clock" id="clock" aria-live="polite" aria-label="Reloj">--:--:--</span>
    <div class="hdr-badge crit" id="badge" role="status" aria-live="polite">
      <span class="badge-dot" aria-hidden="true"></span>
      <span id="badge-txt">2 alertas críticas</span>
    </div>
  </div>
</header>

<div class="workspace">

  <!-- ══ NOA ══ -->
  <section class="panel panel-noa" aria-label="Panel NOA — Monitoreo GPS">
    <div class="phead">
      <div class="adot noa" aria-hidden="true">N</div>
      <span class="aname noa">NOA</span>
      <span class="arole">Monitoreo GPS</span>
      <div class="pchips" id="noa-chips" aria-label="Conteo de alertas"></div>
      <div class="pbtns">
        <button class="btn btn-sm" onclick="openTurno()" aria-label="Abrir entrega de turno">⇄ Turno</button>
        <button class="btn btn-sm" onclick="simBarrido()" id="barrer-btn" aria-label="Ejecutar barrido GPS">↻ Barrer</button>
        <span class="barrido-lbl" id="last-barrido" aria-live="polite"></span>
      </div>
    </div>

    <div class="crit-banner" id="crit-banner" role="alert" aria-live="assertive">
      <div class="crit-pulse" aria-hidden="true"></div>
      <div>
        <div class="crit-main" id="crit-txt"></div>
        <div class="crit-sub" id="crit-sub"></div>
      </div>
    </div>

    <!-- UX: filtros rápidos + búsqueda — identifica un folio en <5s con 20+ activos -->
    <div class="filter-bar" role="toolbar" aria-label="Filtros NOA">
      <input class="search-inp" id="noa-search" type="search" placeholder="Buscar folio, cliente, operador…"
        aria-label="Buscar folio o cliente" oninput="renderNOA()">
      <div class="fchips" role="group" aria-label="Filtrar por nivel de alerta">
        <button class="fchip fch-all on" id="fnoa-all" onclick="setNoaFilter('ALL',this)" aria-pressed="true">Todos</button>
        <button class="fchip fch-r"      id="fnoa-cr"  onclick="setNoaFilter('CRITICO',this)" aria-pressed="false">CRÍTICO</button>
        <button class="fchip fch-o"      id="fnoa-at"  onclick="setNoaFilter('ATENCION',this)" aria-pressed="false">ATENCIÓN</button>
        <button class="fchip fch-g"      id="fnoa-no"  onclick="setNoaFilter('NORMAL',this)" aria-pressed="false">NORMAL</button>
      </div>
    </div>

    <div class="pbody" role="main"><div id="noa-out"></div></div>

    <div class="noa-ai-foot" id="noa-ai-foot">
      <div class="noa-ai-head" onclick="toggleNoaAI()" role="button" tabindex="0"
        aria-expanded="false" aria-controls="noa-msgs"
        onkeydown="if(event.key==='Enter'||event.key===' ')toggleNoaAI()">
        <div class="noa-av-sm" style="width:18px;height:18px;border-radius:50%;background:var(--cr-d) url('/img/noa-avatar.png') center/cover no-repeat;border:1px solid var(--cr-b);flex-shrink:0"></div>
        <span class="noa-ai-lbl">NOA — Consulta AI</span>
        <span class="noa-ai-hint" id="noa-ai-hint">Pregunta sobre protocolos o folios</span>
        <span class="noa-ai-arr" id="noa-ai-arr" aria-hidden="true">▲</span>
      </div>
      <div class="noa-msgs" id="noa-msgs" aria-live="polite" aria-label="Conversación con NOA"></div>
      <div class="noa-inp-area" id="noa-inp-area">
        <textarea class="mta" id="noa-ai-input" rows="1"
          placeholder="Folio, protocolo, operador sin respuesta…"
          aria-label="Mensaje para NOA"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendNoaMsg();}"></textarea>
        <button class="btn btn-r btn-sm" id="noa-send-btn" onclick="sendNoaMsg()" aria-label="Enviar">→</button>
      </div>
    </div>

    <!-- ── FOLIO DETAIL SLIDE-IN PANEL ── -->
    <div class="fd-overlay" id="fd-overlay" role="dialog" aria-modal="true" aria-label="Detalle de folio">
      <div class="fd-head">
        <button class="fd-back" onclick="cerrarFolio()" aria-label="Cerrar detalle">&#8592;</button>
        <span class="fd-folio" id="fd-folio-id">—</span>
        <span class="fd-st-badge" id="fd-st-badge"></span>
        <button class="btn btn-sm" onclick="consultarFolioEnNOA(document.getElementById('fd-folio-id').textContent)" aria-label="Consultar este folio con NOA" style="font-size:10px;padding:4px 9px;flex-shrink:0">Consultar NOA →</button>
      </div>
      <div class="fd-body" id="fd-body">
        <div style="color:var(--t3);font-size:12px;padding:20px 0;text-align:center">Cargando…</div>
      </div>
    </div>
  </section>

  <!-- ══ HÉCTOR ══ -->
  <section class="panel panel-hec" style="display:flex;flex-direction:column" aria-label="Panel HÉCTOR — Cobranza">
    <div class="phead">
      <div class="adot hec" aria-hidden="true">H</div>
      <span class="aname hec">HÉCTOR</span>
      <span class="arole">Cobranza</span>
      <div class="pbtns">
        <button class="btn btn-sm" id="sort-btn" onclick="cycleSort()" aria-label="Cambiar criterio de ordenamiento">Días ↓</button>
      </div>
    </div>

    <div class="kpi-strip" id="kpi-strip" aria-label="KPIs de cobranza"></div>

    <!-- UX: búsqueda + filtro semáforo — encontrar una cuenta específica en 1 acción -->
    <div class="filter-bar" role="toolbar" aria-label="Filtros Cobranza">
      <input class="search-inp" id="hec-search" type="search" placeholder="Buscar cliente o folio…"
        aria-label="Buscar cliente o folio" oninput="tabla()">
      <div class="fchips" role="group" aria-label="Filtrar por semáforo">
        <button class="fchip fch-all on" id="fhec-all" onclick="setHecFilter('all',this)" aria-pressed="true">Todos</button>
        <button class="fchip fvd"        id="fhec-vd"  onclick="setHecFilter('vd',this)"  aria-pressed="false">●&nbsp;Corriente</button>
        <button class="fchip fam"        id="fhec-am"  onclick="setHecFilter('am',this)"  aria-pressed="false">●&nbsp;Por vencer</button>
        <button class="fchip fna"        id="fhec-na"  onclick="setHecFilter('na',this)"  aria-pressed="false">●&nbsp;Vencido</button>
        <button class="fchip fro"        id="fhec-ro"  onclick="setHecFilter('ro',this)"  aria-pressed="false">●&nbsp;Grave</button>
        <button class="fchip fne"        id="fhec-ne"  onclick="setHecFilter('ne',this)"  aria-pressed="false">●&nbsp;Legal</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <table class="cob-tbl" aria-label="Tabla de cuentas por cobrar">
        <thead><tr>
          <th onclick="sortBy('semaforo')" aria-sort="none">Estado<span class="sort-arrow" aria-hidden="true" id="sarr-semaforo"></span></th>
          <th onclick="sortBy('cliente')"  aria-sort="none">Cliente<span class="sort-arrow" aria-hidden="true" id="sarr-cliente"></span></th>
          <th onclick="sortBy('dias')"     aria-sort="descending" class="s">Días<span class="sort-arrow" aria-hidden="true" id="sarr-dias">↓</span></th>
          <th onclick="sortBy('monto')"    aria-sort="none">Monto<span class="sort-arrow" aria-hidden="true" id="sarr-monto"></span></th>
          <th>Última gestión</th>
          <th>Acción</th>
        </tr></thead>
        <tbody id="cob-body"></tbody>
      </table>
    </div>
  </section>
</div>

<!-- Modal Turno -->
<div class="mbg" id="m-turno" role="dialog" aria-modal="true" aria-labelledby="m-turno-title">
  <div class="modal">
    <div class="mtitle"><span id="m-turno-title">⇄ Entrega de Turno — NOA</span><button class="mx" onclick="closeTurno()" aria-label="Cerrar">✕</button></div>
    <div id="turno-body"></div>
    <div class="mfoot">
      <button class="btn" onclick="closeTurno()">Cancelar</button>
      <button class="btn btn-g" onclick="confirmTurno()">✓ Confirmar y entregar</button>
    </div>
  </div>
</div>

<!-- Modal Gestión -->
<div class="mbg" id="m-gestion" role="dialog" aria-modal="true" aria-labelledby="m-gestion-title">
  <div class="modal">
    <div class="mtitle"><span id="m-gestion-title">Gestión de Cobranza</span><button class="mx" onclick="closeGestion()" aria-label="Cerrar">✕</button></div>
    <div id="gestion-body"></div>
    <div class="msec" id="hec-ai-sec" style="display:none">
      <div class="mlbl" style="color:var(--grn)">H · HÉCTOR — Análisis AI</div>
      <div class="hec-stream" id="hec-stream" aria-live="polite"></div>
      <div class="hec-ai-bar">
        <textarea class="mta" id="hec-ai-input" rows="1" placeholder="Pregunta a HÉCTOR…"
          aria-label="Mensaje para HÉCTOR AI"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendHecMsg();}"></textarea>
        <button class="btn btn-sm btn-g" id="hec-send-btn" onclick="sendHecMsg()" aria-label="Enviar a HÉCTOR">→</button>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeGestion()">Cancelar</button>
      <button class="btn btn-g" onclick="confirmGestion()">✓ Registrar</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ── DATA NOA — cargada desde TMS en init ─────────────────────────────────────
var FOLIOS=[];

// ── DATA HÉCTOR ───────────────────────────────────────
var CUENTAS=[

function getVisibleFolios() {
  var q = (document.getElementById('noa-search').value || '').toLowerCase().trim();
  return folios.filter(function(f) {
    if (noaFilter !== 'ALL' && f.al !== noaFilter) return false;
    if (q) {
      return f.id.toLowerCase().indexOf(q) >= 0 ||
             f.cl.toLowerCase().indexOf(q) >= 0 ||
             f.op.toLowerCase().indexOf(q) >= 0 ||
             f.placa.toLowerCase().indexOf(q) >= 0;
    }
    return true;
  });
}

function getVisibleCuentas() {
  var q = (document.getElementById('hec-search').value || '').toLowerCase().trim();
  return cuentas.filter(function(c) {
    if (hecFilter !== 'all' && c.sem !== hecFilter) return false;
    if (q) {
      var matchCl = c.cl.toLowerCase().indexOf(q) >= 0;
      var matchFol = c.fols.some(function(f) { return f.toLowerCase().indexOf(q) >= 0; });
      return matchCl || matchFol;
    }
    return true;
  });
}

    '<span class="chip ch-g">● '+no.length+' NORMAL</span>';

  var b=document.getElementById('badge');

    if(sF==='cliente')  return sD==='asc'?a.cl.localeCompare(b.cl):b.cl.localeCompare(a.cl);
    return sD==='desc'?b[sF]-a[sF]:a[sF]-b[sF];
  });

  // UX: actualizar flechas de sort y aria-sort en encabezados
  ['semaforo','cliente','dias','monto'].forEach(function(col) {
    var arrEl = document.getElementById('sarr-'+col);
    var th = arrEl && arrEl.parentElement;
    if (!arrEl) return;

      if (th) { th.classList.add('s'); th.setAttribute('aria-sort', sD==='desc'?'descending':'ascending'); }
    } else {
      arrEl.textContent = '';
      if (th) { th.classList.remove('s'); th.setAttribute('aria-sort','none'); }

function escalarFolio(id){
  var f=folios.find(function(x){return x.id===id;});
  if(!f) return;
  var paso={nv:'Coordinador Regional',h:new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false}),s:'pd'};
  f.esc=(f.esc||[]).concat([paso]);
  guardarEscalacion(id,f.al,f.inc,f.esc);
  toast('Escalando '+id+' al Coordinador Regional','#FF8C00');
  renderNOA();
}

function resolver(id){
  var f=folios.find(function(x){return x.id===id;});
  if(!f) return;
  f.al='NORMAL';f.inc=null;f.zona=false;f.esc=[];
  guardarEscalacion(id,'NORMAL',null,[]);
  renderNOA(); toast('Folio '+id+' marcado como resuelto','#00B451');
}

// ── AUTO-REFRESH & COUNTDOWN ──────────────────────────
var lastBarridoAt = null;
var AUTO_REFRESH_SECS = 5 * 60;
var autoRefreshTimer = null;
var countdownTimer = null;

function updateBarridoLabel() {
  var el = document.getElementById('last-barrido');
  if (!el) return;
  if (!lastBarridoAt) { el.textContent = ''; return; }
  var secsAgo = Math.floor((Date.now() - lastBarridoAt) / 1000);
  var secsNext = Math.max(0, AUTO_REFRESH_SECS - secsAgo);
  var mm = Math.floor(secsNext / 60), ss = secsNext % 60;
  var timeStr = new Date(lastBarridoAt).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
  el.textContent = timeStr + ' · ' + mm + ':' + (ss < 10 ? '0' : '') + ss;
  el.classList.toggle('pronto', secsNext < 60);
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  if (countdownTimer) clearInterval(countdownTimer);
  autoRefreshTimer = setInterval(function () { simBarrido(true); }, AUTO_REFRESH_SECS * 1000);
  countdownTimer = setInterval(updateBarridoLabel, 5000);
}

// ── ALERTAS AUTOMÁTICAS (citas vencidas) ──────────────
var ALERTA_MAX_HORAS = 48; // ignorar citas más viejas — son datos sin cerrar en TMS

function detectarAlertas(fs) {
  var now = Date.now();
  fs.forEach(function (f) {
    if (!f.citaDesRaw || f.st === 'EN_DESTINO') return;
    var citaMs = new Date(f.citaDesRaw).getTime();
    if (isNaN(citaMs)) return;
    var diffMin = (now - citaMs) / 60000;
    if (diffMin > ALERTA_MAX_HORAS * 60) return; // servicio sin cerrar en TMS — no escalar
    if (diffMin > 120 && f.al === 'NORMAL') {
      f.al = 'CRITICO';
      f.inc = 'Cita de descarga vencida hace ' + Math.round(diffMin / 60) + 'h — sin confirmar entrega';
      guardarEscalacion(f.id, 'CRITICO', f.inc, f.esc);
    } else if (diffMin > 0 && diffMin <= 120 && f.al === 'NORMAL') {
      f.al = 'ATENCION';
      f.inc = 'Cita de descarga vencida (' + Math.round(diffMin) + ' min) — sin confirmar entrega';
      guardarEscalacion(f.id, 'ATENCION', f.inc, f.esc);
    }
  });
}

// ── ESCALACIONES PERSISTENTES ─────────────────────────
function guardarEscalacion(folio, al, inc, esc) {
  fetch('/api/noa/escalaciones', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ folio: folio, al: al, inc: inc || null, esc: esc || [] }),
  }).catch(function () {});
}

// ── NOTIFICACIONES PROACTIVAS ─────────────────────────
var prevAlertSet = {};

function notificarProactivo(fs) {
  var criticos = fs.filter(function (f) { return f.al === 'CRITICO'; });
  var atenciones = fs.filter(function (f) { return f.al === 'ATENCION'; });

  // Detectar nuevas alertas respecto al barrido anterior
  var nuevas = criticos.concat(atenciones).filter(function (f) {
    return !prevAlertSet[f.id] || prevAlertSet[f.id] === 'NORMAL';
  });

  // Actualizar mapa previo
  prevAlertSet = {};
  fs.forEach(function (f) { prevAlertSet[f.id] = f.al; });

  if (!nuevas.length) return;

  // Browser notification
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    var crit = nuevas.filter(function (f) { return f.al === 'CRITICO'; });
    var body = (crit.length ? crit.length + ' CRÍTICO(S): ' + crit.map(function (f) { return f.id; }).join(', ') : '') +
               (atenciones.length ? ' · ' + atenciones.length + ' en ATENCIÓN' : '');
    try { new Notification('NOA · Alerta detectada', { body: body.trim(), icon: '/img/noa-avatar.png', tag: 'noa-alert' }); } catch (e) {}
  }

  // Auto-mensaje en chat de NOA (sin llamar a la API — solo muestra en la UI)
  var h = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
  var lineas = ['**Barrido ' + h + ' — ' + nuevas.length + ' nueva(s) alerta(s)**'];
  nuevas.forEach(function (f) {
    lineas.push((f.al === 'CRITICO' ? '⚠ CRÍTICO' : '△ ATENCIÓN') + ' — **' + f.id + '** · ' + f.cl + (f.inc ? '\n' + f.inc : ''));
  });
  lineas.push('\n¿Qué necesitas revisar primero?');

  var foot = document.getElementById('noa-ai-foot');
  if (foot && !foot.classList.contains('open')) toggleNoaAI();
  addBubble('noa', lineas.join('\n\n'), true);
  var msgs = document.getElementById('noa-msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function abrirFolioTMS(id, intento){
  var body = document.getElementById('fd-body');
  if (!body) return;
  fetch('/api/noa/folio/' + encodeURIComponent(id))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      if (!d) { mostrarFolioSinDatos(id); return; }
      renderFolioDetail(d);
    })
    .catch(function(){
      if ((intento||0) < 2) {
        setTimeout(function(){ abrirFolioTMS(id, (intento||0)+1); }, 2000);
        return;
      }
      // Todos los reintentos fallaron — muestra lo que ya se ve + botón reintentar

function renderETA(etaData, citaDesRaw){
  if (!etaData) return '';

  if (etaData.llegado) {
    return '<div class="fd-eta-box eta-done">'+
      '<div class="fd-eta-ico">✅</div>'+
      '<div class="fd-eta-main">'+
        '<div class="fd-eta-label eta-done">En destino</div>'+
        '<div class="fd-eta-time">Unidad llegó</div>'+
      '</div></div>';
  }

  if (!etaData.eta) return '';

  var etaMs  = new Date(etaData.eta).getTime();
  var now    = Date.now();
  var citaMs = citaDesRaw ? new Date(citaDesRaw).getTime() : 0;
  var diffMin = Math.round((etaMs - now) / 60000);

  // classify
  var cls, lbl;
  if (etaMs < now) {
    cls = 'eta-late'; lbl = 'RETRASADO';
  } else if (citaMs && etaMs > citaMs) {
    cls = 'eta-late'; lbl = 'POSIBLE RETRASO';
  } else if (citaMs && (citaMs - etaMs) < 90 * 60000) {
    cls = 'eta-risk'; lbl = 'LLEGADA JUSTA';
  } else {
    cls = 'eta-ok'; lbl = 'EN TIEMPO';
  }

  // format ETA datetime
  var etaDate = new Date(etaMs);
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var manana = new Date(hoy); manana.setDate(manana.getDate()+1);
  var etaDia = new Date(etaMs); etaDia.setHours(0,0,0,0);
  var diaLabel;
  if (etaDia.getTime() === hoy.getTime()) diaLabel = 'Hoy';
  else if (etaDia.getTime() === manana.getTime()) diaLabel = 'Mañana';
  else diaLabel = etaDate.toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short'});
  var horaLabel = etaDate.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});
  var etaStr = diaLabel + ' ' + horaLabel;

  // remaining / delay
  var diffAbs = Math.abs(diffMin);
  var diffH = Math.floor(diffAbs/60); var diffM = diffAbs%60;
  var diffStr = (diffH>0?(diffH+'h '):'')+(diffM+'min');
  var remainLabel = etaMs < now
    ? 'Retraso estimado: ' + diffStr
    : 'En ' + diffStr;

  // extra meta
  var meta = [];
  if (etaData.distancia_km) meta.push(etaData.distancia_km + ' km');
  if (etaData.duracion_min) {
    var th=Math.floor(etaData.duracion_min/60),tm=etaData.duracion_min%60;
    meta.push('Ruta: '+(th>0?th+'h ':'')+(tm+'min'));
  }
  if (etaData.salida) meta.push('Salió: '+new Date(etaData.salida).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false}));
  meta.push(etaData.source==='google' ? 'Google Maps' : 'Cita programada');

  var ico = cls==='eta-late' ? '⚠️' : cls==='eta-risk' ? '🟡' : '🟢';

  return '<div class="fd-eta-box '+cls+'">'+
    '<div class="fd-eta-ico">'+ico+'</div>'+
    '<div class="fd-eta-main">'+
      '<div class="fd-eta-label '+cls+'">ETA — '+lbl+'</div>'+
      '<div class="fd-eta-time">'+etaStr+'</div>'+
      '<div class="fd-eta-meta">'+remainLabel+(meta.length?' · '+meta.join(' · '):'')+'</div>'+
    '</div></div>';
}

    .then(function(r){return r.json();})
    .then(function(data){
      FOLIOS = data;
      folios = data.map(function(f){return Object.assign({},f,{esc:(f.esc||[]).slice()});});
      detectarAlertas(folios);
      renderNOA();
      lastBarridoAt = Date.now();
      updateBarridoLabel();
      notificarProactivo(folios);

    'Cliente: '+c.cl+'\nFacturas: '+c.fols.join(', ')+'\nMonto: $'+c.monto.toLocaleString('es-MX')+'\nDías vencido: '+c.dias+'\nSemáforo: '+SEM[c.sem].lbl+'\nÚltima gestión: '+c.ult+' ('+c.fecha+')\nResponsable: '+c.resp+'\n¿Qué acción recomiendas?';
  streamHector(briefing);
}

// ── HÉCTOR AI ─────────────────────────────────────────
function showHecAI(){
  var sec=document.getElementById('hec-ai-sec');
  var stream=document.getElementById('hec-stream');
  sec.style.display='block';
  stream.className='hec-stream streaming';
  stream.textContent='';
  document.getElementById('hec-ai-input').value='';
}

function streamHector(msg){
  if(hecStreaming) return;
  hecStreaming=true;
  document.getElementById('hec-send-btn').disabled=true;
  var stream=document.getElementById('hec-stream');
  stream.className='hec-stream streaming';

  fetch('/api/hector/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,sessionId:hecSid})
  }).then(function(r){
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    var reader=r.body.getReader(),decoder=new TextDecoder(),buf='',acc='';
    function pump(){
      reader.read().then(function(chunk){
        if(chunk.done){done();return;}
        buf+=decoder.decode(chunk.value,{stream:true});
        var lines=buf.split('\n\n');buf=lines.pop();
        lines.forEach(function(l){
          if(!l.startsWith('data: ')) return;
          try{
            var d=JSON.parse(l.slice(6));
            if(d.type==='chunk'){acc+=d.text;stream.textContent=acc;}
            if(d.type==='done'){done();}
            if(d.type==='plantilla_lista'){toast('Plantilla lista — '+d.datos.tipo,'#00B451');}
          }catch(e){}
        });
        pump();
      }).catch(function(){done();});
    }
    function done(){stream.className='hec-stream';hecStreaming=false;document.getElementById('hec-send-btn').disabled=false;}
    pump();
  }).catch(function(err){
    stream.className='hec-stream';
    stream.textContent='Error al conectar con HÉCTOR. Verifica que el servidor esté corriendo.';
    hecStreaming=false;
    document.getElementById('hec-send-btn').disabled=false;
  });
}

function sendHecMsg(){
  var inp=document.getElementById('hec-ai-input');
  var msg=inp.value.trim();
  if(!msg||hecStreaming) return;
  var stream=document.getElementById('hec-stream');
  stream.textContent+='\n\n— '+msg+'\n\n';
  inp.value='';
  streamHector(msg);
}

// ── Markdown renderer ────────────────────────────────────────────────────────
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escH(t){return esc(t).replace(/"/g,'&quot;');}

function inlineFmt(t){
  // escape HTML first, then apply inline markdown
  return esc(t)
    .replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/~~([^~\n]+)~~/g,'<del>$1</del>')
    // restore inline code placeholders as-is (already escaped before)
    .replace(/\x00IC(\d+)\x00/g,function(m,x){return m;});
}

function renderMd(raw){
  if(!raw) return '<p>'+esc(raw)+'</p>';

  // 1. protect fenced code blocks
  var cbs=[];
  var s = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,lang,code){
    cbs.push('<pre><code>'+ esc(code.replace(/\n$/,'')) +'</code></pre>');
    return '\x00CB'+(cbs.length-1)+'\x00';
  });

  // 2. protect inline code
  var ics=[];
  s = s.replace(/`([^`\n]+)`/g, function(m,c){
    ics.push('<code>'+esc(c)+'</code>');
    return '\x00IC'+(ics.length-1)+'\x00';
  });

  var lines = s.split('\n'), out=[], i=0;

  while(i < lines.length){
    var ln = lines[i];

    // code block placeholder
    if(ln.match(/^\x00CB\d+\x00$/)){out.push(ln);i++;continue;}

    // table: header row followed by separator row (|---|---|)
    if(ln.match(/^\s*\|/) && i+1 < lines.length && lines[i+1].match(/^\s*\|[\s\-:|]+\|/)){
      var tbl='<table><thead><tr>';
      ln.split('|').slice(1,-1).forEach(function(c){
        tbl+='<th>'+inlineFmt(c.trim().replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</th>';
      });
      tbl+='</tr></thead><tbody>'; i+=2;
      while(i<lines.length && lines[i].match(/^\s*\|/)){
        tbl+='<tr>';
        lines[i].split('|').slice(1,-1).forEach(function(c){
          tbl+='<td>'+inlineFmt(c.trim().replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</td>';
        });
        tbl+='</tr>'; i++;
      }
      out.push(tbl+'</tbody></table>'); continue;
    }

    // ATX headers (#, ##, ###, ####)
    var hm = ln.match(/^(#{1,4})\s+(.+)/);
    if(hm){
      var hlv = Math.min(hm[1].length + 1, 5); // # → h2, ## → h3, ### → h4, #### → h4
      if(hlv > 4) hlv = 4;
      out.push('<h'+hlv+'>'+inlineFmt(hm[2].replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</h'+hlv+'>');
      i++; continue;
    }

    // horizontal rule (--- only, not inside table context)
    if(ln.match(/^-{3,}$/) || ln.match(/^\*{3,}$/) || ln.match(/^_{3,}$/)){
      out.push('<hr>'); i++; continue;
    }

    // unordered list (- item or * item), with checkbox support
    if(ln.match(/^[\-\*]\s/)){
      var ul='<ul>';
      while(i<lines.length && lines[i].match(/^[\-\*]\s/)){
        var it = lines[i].replace(/^[\-\*]\s/,'');
        var cbm = it.match(/^\[([ xX✓])\]\s(.+)/);
        if(cbm){
          var done = cbm[1].trim() !== '';
          ul+='<li><span class="'+(done?'cb-check':'cb-empty')+'">'+(done?'☑':'☐')+'</span> '+
              inlineFmt(cbm[2].replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</li>';
        } else {
          ul+='<li>'+inlineFmt(it.replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</li>';
        }
        i++;
      }
      out.push(ul+'</ul>'); continue;
    }

    // ordered list
    if(ln.match(/^\d+[\.\)]\s/)){
      var ol='<ol>';
      while(i<lines.length && lines[i].match(/^\d+[\.\)]\s/)){
        ol+='<li>'+inlineFmt(lines[i].replace(/^\d+[\.\)]\s/,'').replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];}))+'</li>';
        i++;
      }
      out.push(ol+'</ol>'); continue;
    }

    // blank line → paragraph break
    if(!ln.trim()){i++;continue;}

    // paragraph — accumulate consecutive text lines
    var ps=[];
    while(i<lines.length && lines[i].trim() &&
          !lines[i].match(/^[#\|\-\*]/) &&
          !lines[i].match(/^\d+[\.\)]\s/) &&
          !lines[i].match(/^\x00CB/)){
      ps.push(inlineFmt(lines[i].replace(/\x00IC(\d+)\x00/g,function(m,x){return ics[+x];})));
      i++;
    }
    if(ps.length) out.push('<p>'+ps.join('<br>')+'</p>');
  }

  s = out.join('\n');
  // restore code blocks
  s = s.replace(/\x00CB(\d+)\x00/g, function(m,x){return cbs[+x];});
  s = s.replace(/\x00IC(\d+)\x00/g, function(m,x){return ics[+x];});
  return s || '<p>'+esc(raw)+'</p>';
}

// ── NOA chat send / stream ───────────────────────────────────────────────────
function addBubble(role, text, rendered){
  var msgs = document.getElementById('noa-msgs');
  var row = document.createElement('div');
  row.className = 'nm ' + role;
  if(role==='noa'){
    row.innerHTML = '<div class="nm-av" aria-hidden="true"></div><div class="nm-bubble"></div>';
    if(rendered) row.querySelector('.nm-bubble').innerHTML = renderMd(text);
  } else {
    row.innerHTML = '<div class="nm-bubble">' + esc(text) + '</div>';
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row.querySelector('.nm-bubble');
}

function streamNoa(msg){
  if(noaStreaming) return;
  noaStreaming = true;
  document.getElementById('noa-send-btn').disabled = true;
  var bubble = addBubble('noa','');
  var row = bubble.parentElement;
  row.classList.add('streaming');
  var acc = '';

  fetch('/api/noa/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,sessionId:noaSid})
  }).then(function(r){
    if(!r.ok||!r.body) throw new Error('HTTP '+r.status);
    var reader=r.body.getReader(), decoder=new TextDecoder(), buf='';
    function pump(){
      reader.read().then(function(chunk){
        if(chunk.done){done();return;}
        buf += decoder.decode(chunk.value,{stream:true});
        var parts = buf.split('\n\n'); buf = parts.pop();
        parts.forEach(function(l){
          if(!l.startsWith('data: ')) return;
          try{
            var d = JSON.parse(l.slice(6));
            if(d.type==='chunk'){
              acc += d.text;
              bubble.textContent = acc;
              document.getElementById('noa-msgs').scrollTop = 99999;
            }
            if(d.type==='done') done();
            if(d.type==='alerta_critica') toast('⚠ ALERTA CRÍTICA — '+d.datos.folio+': '+d.datos.motivo,'#FF3A3A');
          }catch(e){}
        });
        pump();
      }).catch(done);
    }
    function done(){
      row.classList.remove('streaming');
      bubble.innerHTML = renderMd(acc);
      document.getElementById('noa-msgs').scrollTop = 99999;
      noaStreaming = false;
      document.getElementById('noa-send-btn').disabled = false;
    }
    pump();
  }).catch(function(){
    row.classList.remove('streaming');
    bubble.textContent = 'Error al conectar con NOA.';
    noaStreaming = false;
    document.getElementById('noa-send-btn').disabled = false;
  });
}

function sendNoaMsg(){
  var inp = document.getElementById('noa-ai-input');
  var msg = inp.value.trim();
  if(!msg || noaStreaming) return;
  inp.value = '';
  inp.style.height = '';
  addBubble('user', msg);
  streamNoa(msg);
}

// ── UTILS ─────────────────────────────────────────────
function mxn(n){return n.toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0});}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function E(s){return s.replace(/'/g,"\\'");}
function toast(msg,col){
  var t=document.createElement('div');
  t.className='toast';
  t.style.borderLeft='3px solid '+col;
  t.textContent=msg;
  t.setAttribute('role','status');
  t.setAttribute('aria-live','polite');
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3000);
}

// ── CLOCK + SIM TICK ──────────────────────────────────
function updateClock(){
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('es-MX',{hour12:false})+'  ·  '+
    new Date().toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
}

function simTick(){
  tick++;
  if(tick%10===0){
    folios.forEach(function(f){
      if(f.st==='EN_TRANSITO'||f.st==='EN_CARGA'){
        f.min+=1;
        if(f.min>30&&f.al==='NORMAL') f.al='ATENCION';
      }
    });
    renderNOA();
  }
}

// ── INIT ──────────────────────────────────────────────
var _foliosRetryTimer = null;
var _foliosRetryCount = 0;
var _foliosRetryDelays = [5, 10, 20, 30, 60]; // segundos

function loadFoliosTMS(intento){
  intento = intento || 0;
  _foliosRetryCount = intento;
  var out = document.getElementById('noa-out');
  if (out && intento === 0) {
    out.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);font-size:11px">Cargando servicios activos del TMS…</div>';
  }
  fetch('/api/noa/folios')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){
      _foliosRetryCount = 0;
      if(_foliosRetryTimer){ clearTimeout(_foliosRetryTimer); _foliosRetryTimer=null; }
      FOLIOS = data;
      folios = data.map(function(f){return Object.assign({},f,{esc:(f.esc||[]).slice()});});
      detectarAlertas(folios);
      lastBarridoAt = Date.now();
      updateBarridoLabel();
      folios.forEach(function(f){ prevAlertSet[f.id]=f.al; });
      renderNOA();
    })
    .catch(function(e){
      var delay = _foliosRetryDelays[Math.min(intento, _foliosRetryDelays.length-1)];
      var out2 = document.getElementById('noa-out');
      // Si ya hay folios cargados, no borrar — solo tostar
      if (folios.length > 0) {
        toast('TMS no respondió — reintentando en '+delay+'s','#FF8C00');
      } else if (out2) {
        out2.innerHTML = retryBanner(delay, intento);
        iniciarCuentaRegresivaBanner(delay, intento);
      }
      _foliosRetryTimer = setTimeout(function(){ loadFoliosTMS(intento+1); }, delay*1000);
    });
}

function retryBanner(delay, intento){
  return '<div id="tms-retry-banner" style="padding:28px 20px;text-align:center">'+
    '<div style="font-size:12px;color:var(--t2);margin-bottom:8px">'+
      (intento===0 ? 'Conectando con el TMS…' : 'TMS no respondió')+
    '</div>'+
    '<div style="font-size:11px;color:var(--t3);margin-bottom:14px">'+
      'Reintentando en <span id="retry-countdown">'+delay+'</span>s'+
    '</div>'+
    '<button class="btn btn-sm" onclick="if(_foliosRetryTimer)clearTimeout(_foliosRetryTimer);loadFoliosTMS(0)" style="font-size:11px">'+
      '↻ Reintentar ahora'+
    '</button>'+
  '</div>';
}

function iniciarCuentaRegresivaBanner(delay, intento){
  var rem = delay;
  var iv = setInterval(function(){
    rem--;
    var el = document.getElementById('retry-countdown');
    if(!el){ clearInterval(iv); return; }
    el.textContent = rem;
    if(rem<=0) clearInterval(iv);
  }, 1000);
}

document.addEventListener('DOMContentLoaded',function(){
  updateClock();
  setInterval(updateClock,1000);
  setInterval(simTick,5000);
  loadFoliosTMS();
  startAutoRefresh();
  if(typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission().catch(function(){});
  }
  renderHEC();
  fetchCuentas();
  ['m-turno','m-gestion'].forEach(function(id){
    document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){closeTurno();closeGestion();if(fdOpen)cerrarFolio();}
  });
});
