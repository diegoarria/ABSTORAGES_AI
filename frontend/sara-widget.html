<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SARA · ABSTORAGES</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a; color: #e8e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      padding: 12px 16px; background: #0f1d4a;
      border-bottom: 1px solid #1e3a7a;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #1a3a8f, #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; color: #fff; flex-shrink: 0;
    }
    .header-info .name  { font-weight: 600; font-size: .88rem; }
    .header-info .status { font-size: .7rem; color: #5cdb95; margin-top: 1px; }
    .messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 9px;
      scrollbar-width: thin; scrollbar-color: #2a2a4a transparent;
    }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 82%; padding: 9px 13px;
      font-size: .82rem; line-height: 1.55; word-break: break-word;
    }
    .msg.sara .bubble {
      background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 10px 10px 10px 2px;
    }
    .msg.user .bubble {
      background: #1a3a8f; border: 1px solid #2a4abf;
      border-radius: 10px 10px 2px 10px;
    }
    .typing-wrap { display: flex; }
    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 10px 14px; background: #1a1a3a;
      border: 1px solid #2a2a4a; border-radius: 10px 10px 10px 2px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #6b7280; animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .input-row {
      padding: 10px 12px; background: #0f0f1a;
      border-top: 1px solid #2a2a4a;
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .input-row input {
      flex: 1; background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 8px; padding: 9px 12px;
      color: #e8e8f0; font-size: .82rem; outline: none; transition: border .15s;
    }
    .input-row input:focus { border-color: #2563eb; }
    .input-row input:disabled { opacity: .45; cursor: not-allowed; }
    .send {
      width: 36px; height: 36px; border-radius: 8px;
      background: #1a3a8f; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .send:hover:not(:disabled) { background: #2563eb; }
    .send:disabled { opacity: .4; cursor: not-allowed; }
    .closed-bar {
      text-align: center; font-size: .72rem; color: #6b7280;
      padding: 10px; border-top: 1px solid #2a2a4a; background: #0f0f1a;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">S</div>
    <div class="header-info">
      <div class="name">SARA · ABSTORAGES</div>
      <div class="status">● En línea</div>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div id="bottom">
    <div class="input-row">
      <input id="inp" type="text" placeholder="Escribe tu mensaje..." autofocus>
      <button class="send" id="btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const SESSION = 'widget_' + Math.random().toString(36).slice(2);
    const msgsEl  = document.getElementById('msgs');
    const inp     = document.getElementById('inp');
    const btn     = document.getElementById('btn');
    let closed = false;

    function addBubble(role, html) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.innerHTML = `<div class="bubble">${html}</div>`;
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return d;
    }

    function toHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    }

    function showTyping() {
      const d = document.createElement('div');
      d.className = 'typing-wrap'; d.id = 'typ';
      d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    function hideTyping() { document.getElementById('typ')?.remove(); }

    function closeChat() {
      closed = true;
      document.getElementById('bottom').innerHTML =
        '<div class="closed-bar">— Chat finalizado · Gracias por contactar ABSTORAGES —</div>';
    }

    async function send() {
      const text = inp.value.trim();
      if (!text || closed) return;
      inp.value = '';
      addBubble('user', toHtml(text));
      inp.disabled = true; btn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/api/widget/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId: SESSION }),
        });
        hideTyping();

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let saraDiv = null, saraText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of decoder.decode(value).split('\n')) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'chunk') {
                saraText += evt.text;
                const clean = saraText
                  .replace(/NUEVA_ORDEN\s*:\s*\{[\s\S]*?\}/gi, '')
                  .replace(/CERRAR_CHAT|ESCALAR_HUMANO/gi, '').trim();
                if (!saraDiv) saraDiv = addBubble('sara', toHtml(clean));
                else saraDiv.querySelector('.bubble').innerHTML = toHtml(clean);
                msgsEl.scrollTop = msgsEl.scrollHeight;
              } else if (evt.type === 'cerrar_chat') {
                closeChat(); return;
              }
            } catch {}
          }
        }
      } catch {
        hideTyping();
        addBubble('sara', 'Error de conexión. Intenta de nuevo.');
      }

      if (!closed) { inp.disabled = false; btn.disabled = false; inp.focus(); }
    }

    btn.addEventListener('click', send);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });

    // Saludo inicial
    addBubble('sara', '¡Hola! Soy SARA, ejecutiva comercial de <b>ABSTORAGES</b>.<br>¿En qué puedo ayudarte hoy?');
  </script>
</body>
</html>
