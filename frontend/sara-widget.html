<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SARA · ABSTORAGES</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a; color: #e8e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      padding: 12px 16px; background: #0f1d4a;
      border-bottom: 1px solid #1e3a7a;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1a3a8f url('/img/sara-avatar.png') center/cover no-repeat;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; color: transparent; flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-info .name  { font-weight: 600; font-size: .88rem; }
    .header-info .status { font-size: .7rem; color: #5cdb95; margin-top: 1px; }
    .btn-call {
      width: 32px; height: 32px; border-radius: 50%;
      background: #00B451; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, transform .15s;
    }
    .btn-call:hover { background: #009940; transform: scale(1.08); }
    .messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 9px;
      scrollbar-width: thin; scrollbar-color: #2a2a4a transparent;
    }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 82%; padding: 9px 13px;
      font-size: .82rem; line-height: 1.55; word-break: break-word;
    }
    .msg.sara .bubble {
      background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 10px 10px 10px 2px;
    }
    .msg.user .bubble {
      background: #1a3a8f; border: 1px solid #2a4abf;
      border-radius: 10px 10px 2px 10px;
    }
    .typing-wrap { display: flex; }
    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 10px 14px; background: #1a1a3a;
      border: 1px solid #2a2a4a; border-radius: 10px 10px 10px 2px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #6b7280; animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .input-row {
      padding: 10px 12px; background: #0f0f1a;
      border-top: 1px solid #2a2a4a;
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .input-row input {
      flex: 1; background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 8px; padding: 9px 12px;
      color: #e8e8f0; font-size: .82rem; outline: none; transition: border .15s;
    }
    .input-row input:focus { border-color: #2563eb; }
    .input-row input:disabled { opacity: .45; cursor: not-allowed; }
    .send {
      width: 36px; height: 36px; border-radius: 8px;
      background: #1a3a8f; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .send:hover:not(:disabled) { background: #2563eb; }
    .send:disabled { opacity: .4; cursor: not-allowed; }
    .closed-bar {
      text-align: center; font-size: .72rem; color: #6b7280;
      padding: 10px; border-top: 1px solid #2a2a4a; background: #0f0f1a;
    }

    /* ── Call overlay ────────────────────────────────────────────────────── */
    #call-overlay {
      display: none; position: absolute; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0a1628 0%, #0f2040 60%, #091520 100%);
      flex-direction: column; align-items: center; justify-content: center;
    }
    #call-overlay.active { display: flex; }

    .call-photo {
      width: 100px; height: 100px; border-radius: 50%;
      background: #1a3a8f url('/img/sara-avatar.png') center/cover no-repeat;
      margin-bottom: 16px;
    }
    /* Rings animate only when SARA talks */
    .call-photo.talking {
      animation: ring 1.4s ease-out infinite;
    }
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0 rgba(0,180,81,.6); }
      70%  { box-shadow: 0 0 0 20px rgba(0,180,81,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,180,81,0); }
    }
    /* Mic wave when listening */
    .call-photo.listening {
      animation: mic-wave 1s ease-in-out infinite alternate;
    }
    @keyframes mic-wave {
      0%   { box-shadow: 0 0 0 0 rgba(37,99,235,.5); }
      100% { box-shadow: 0 0 0 16px rgba(37,99,235,0); }
    }

    .call-name { font-size: 1.1rem; font-weight: 700; color: #e8e8f0; margin-bottom: 3px; }
    .call-sub  { font-size: .7rem; color: #7ab0e8; margin-bottom: 22px; }
    .call-status {
      font-size: .78rem; color: #5cdb95; margin-bottom: 28px;
      min-height: 18px; text-align: center; padding: 0 24px; line-height: 1.5;
    }

    /* Sound bars — visible when SARA is talking */
    .sound-bars {
      display: flex; gap: 3px; align-items: flex-end; height: 28px;
      margin-bottom: 28px; opacity: 0; transition: opacity .2s;
    }
    .sound-bars.active { opacity: 1; }
    .bar {
      width: 4px; background: #00B451; border-radius: 2px;
      animation: bar-bounce 0.6s ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { animation-delay: 0s;    animation-duration: .5s; }
    .bar:nth-child(2) { animation-delay: .1s;   animation-duration: .7s; }
    .bar:nth-child(3) { animation-delay: .2s;   animation-duration: .4s; }
    .bar:nth-child(4) { animation-delay: .05s;  animation-duration: .6s; }
    .bar:nth-child(5) { animation-delay: .15s;  animation-duration: .5s; }
    @keyframes bar-bounce {
      from { height: 4px; }
      to   { height: 22px; }
    }

    .call-controls { display: flex; gap: 32px; align-items: center; }
    .btn-mute {
      width: 46px; height: 46px; border-radius: 50%;
      background: #1a3a6a; border: 2px solid #2a5abf; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .btn-mute.muted { background: #7f1d1d; border-color: #991b1b; }
    .btn-hangup {
      width: 56px; height: 56px; border-radius: 50%;
      background: #dc2626; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
    }
    .btn-hangup:hover { background: #b91c1c; transform: scale(1.06); }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar"></div>
    <div class="header-info">
      <div class="name">SARA Garza · ABSTORAGES</div>
      <div class="status">● En línea</div>
    </div>
    <button class="btn-call" id="open-call" title="Llamar a SARA" aria-label="Llamar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.86 12 19.79 19.79 0 0 1 1.78 3.38 2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.18 6.18l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <!-- Call overlay — hands-free mode -->
  <div id="call-overlay">
    <div class="call-photo" id="call-photo"></div>
    <div class="call-name">SARA Garza</div>
    <div class="call-sub">Ejecutiva Comercial · ABSTORAGES</div>
    <div class="call-status" id="call-status">Conectando…</div>
    <div class="sound-bars" id="sound-bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="call-controls">
      <button class="btn-mute" id="btn-mute" title="Silenciar" aria-label="Silenciar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="btn-hangup" id="btn-hangup" title="Colgar" aria-label="Colgar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.71 16.67C20.66 13.78 16.54 12 12 12 7.46 12 3.34 13.78.29 16.67c-.18.18-.29.43-.29.71 0 .28.11.53.29.71l2.48 2.48c.18.18.43.29.71.29.27 0 .52-.11.7-.28.79-.74 1.69-1.36 2.66-1.85.33-.16.56-.5.56-.9v-3.1c1.45-.47 2.98-.73 4.6-.73 1.62 0 3.15.26 4.6.72v3.1c0 .39.23.74.56.9.98.49 1.87 1.12 2.67 1.85.18.18.43.28.7.28.28 0 .53-.11.71-.29l2.48-2.48c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div id="bottom">
    <div class="input-row">
      <input id="inp" type="text" placeholder="Escribe tu mensaje..." autofocus>
      <button class="send" id="btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BASE    = window.location.origin;
    const SESSION = 'widget_' + Math.random().toString(36).slice(2);
    const msgsEl  = document.getElementById('msgs');
    const inp     = document.getElementById('inp');
    const btn     = document.getElementById('btn');
    let closed    = false;

    // ── Chat ─────────────────────────────────────────────────────────────────
    function addBubble(role, html) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.innerHTML = `<div class="bubble">${html}</div>`;
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return d;
    }
    function toHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    }
    function showTyping() {
      const d = document.createElement('div');
      d.className = 'typing-wrap'; d.id = 'typ';
      d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    function hideTyping() { document.getElementById('typ')?.remove(); }
    function closeChat() {
      closed = true;
      document.getElementById('bottom').innerHTML =
        '<div class="closed-bar">— Chat finalizado · Gracias por contactar ABSTORAGES —</div>';
    }
    function cleanText(t) {
      return t.replace(/NUEVA_ORDEN\s*:\s*\{[\s\S]*?\}/gi,'')
              .replace(/LEAD_DATA\s*:\s*\{[^\n]*\}/gi,'')
              .replace(/CERRAR_CHAT|ESCALAR_HUMANO/gi,'')
              .replace(/<[^>]+>/g,'').trim();
    }

    async function sendMessage(text) {
      if (!text || closed) return null;
      addBubble('user', toHtml(text));
      inp.disabled = true; btn.disabled = true;
      showTyping();
      let saraText = '', saraDiv = null;
      try {
        const res = await fetch(`${BASE}/api/widget/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId: SESSION }),
        });
        hideTyping();
        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of dec.decode(value).split('\n')) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'chunk') {
                saraText += evt.text;
                const clean = cleanText(saraText);
                if (!saraDiv) saraDiv = addBubble('sara', toHtml(clean));
                else saraDiv.querySelector('.bubble').innerHTML = toHtml(clean);
                msgsEl.scrollTop = msgsEl.scrollHeight;
              } else if (evt.type === 'cerrar_chat') {
                closeChat(); return saraText;
              }
            } catch {}
          }
        }
      } catch {
        hideTyping();
        addBubble('sara', 'Error de conexión. Intenta de nuevo.');
      }
      if (!closed) { inp.disabled = false; btn.disabled = false; inp.focus(); }
      return saraText;
    }

    async function send() {
      const text = inp.value.trim();
      if (!text || closed) return;
      inp.value = '';
      await sendMessage(text);
    }
    btn.addEventListener('click', send);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });
    addBubble('sara', '¡Hola! Soy <b>SARA Garza</b>, ejecutiva comercial de <b>ABSTORAGES Logistics Solutions</b>.<br>¿Con quién tengo el gusto y de qué empresa me contactas?');

    // ── Call — hands-free voice conversation ──────────────────────────────────
    const overlay    = document.getElementById('call-overlay');
    const callPhoto  = document.getElementById('call-photo');
    const callStatus = document.getElementById('call-status');
    const soundBars  = document.getElementById('sound-bars');
    const btnMute    = document.getElementById('btn-mute');
    const btnHangup  = document.getElementById('btn-hangup');
    const openCallBtn= document.getElementById('open-call');

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    // State machine: idle | listening | processing | speaking
    let callState = 'idle';
    let inCall    = false;
    let muted     = false;
    let activeRec = null;   // current SpeechRecognition instance
    let activeAudio = null; // current Audio playing

    function setStatus(txt, color) {
      callStatus.textContent = txt;
      callStatus.style.color = color || '#5cdb95';
    }

    function setSpeakingUI(on) {
      callPhoto.classList.toggle('talking', on);
      callPhoto.classList.toggle('listening', false);
      soundBars.classList.toggle('active', on);
    }

    function setListeningUI(on) {
      callPhoto.classList.toggle('listening', on && !muted);
      callPhoto.classList.toggle('talking', false);
      soundBars.classList.toggle('active', false);
    }

    // Stop any active audio (barge-in or hangup)
    function stopAudio() {
      if (activeAudio) {
        activeAudio.pause();
        activeAudio.src = '';
        activeAudio = null;
      }
      setSpeakingUI(false);
    }

    // Stop recognition without triggering restart
    function stopRec() {
      if (activeRec) {
        activeRec._stopped = true;
        try { activeRec.abort(); } catch {}
        activeRec = null;
      }
      setListeningUI(false);
    }

    // Play TTS and return when done (or interrupted)
    async function playTTS(text) {
      if (!text || !inCall) return;
      setSpeakingUI(true);
      setStatus('● SARA está hablando…');
      try {
        const res = await fetch(`${BASE}/api/widget/tts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error('tts-error');
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        activeAudio = new Audio(url);
        await new Promise(resolve => {
          activeAudio.onended = resolve;
          activeAudio.onerror = resolve;
          activeAudio.play().catch(resolve);
        });
        URL.revokeObjectURL(url);
        activeAudio = null;
      } catch { activeAudio = null; }
      setSpeakingUI(false);
    }

    // Core recognition loop — starts one recognition session, auto-restarts
    function startListening() {
      if (!inCall || muted || !SR) return;
      stopRec(); // abort previous if any

      callState = 'listening';
      setListeningUI(true);
      setStatus('● Escuchando…');

      const rec = new SR();
      rec._stopped = false;
      rec.lang = 'es-MX';
      rec.continuous = false;
      rec.interimResults = true; // needed for barge-in detection
      activeRec = rec;

      rec.onresult = (e) => {
        const last = e.results[e.results.length - 1];

        // Barge-in: user spoke while SARA is talking → stop audio immediately
        if (callState === 'speaking') {
          stopAudio();
          callState = 'listening';
        }

        if (last.isFinal) {
          const text = last[0].transcript.trim();
          rec._stopped = true; // prevent onend from restarting
          activeRec = null;
          setListeningUI(false);
          if (text) processUserSpeech(text);
        }
      };

      rec.onerror = (e) => {
        if (e.error === 'not-allowed') {
          setStatus('⚠ Permite el micrófono en tu navegador', '#f59e0b');
          inCall = false;
        }
      };

      rec.onend = () => {
        // Restart automatically unless we stopped intentionally or processing
        if (!rec._stopped && inCall && !muted && callState === 'listening') {
          setTimeout(startListening, 80);
        }
      };

      try { rec.start(); } catch {}
    }

    // Process what the user said
    async function processUserSpeech(text) {
      if (!inCall || !text) return;
      callState = 'processing';
      setStatus('● Procesando…', '#7ab0e8');

      const raw = await sendMessage(text);
      if (!inCall) return;

      if (raw) {
        const clean = cleanText(raw);
        if (clean) {
          callState = 'speaking';
          await playTTS(clean);
        }
      }

      if (inCall) startListening(); // go back to listening
    }

    // Open call — greeting then listen
    async function openCall() {
      if (!SR) {
        alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
        return;
      }
      inCall = true;
      overlay.classList.add('active');
      openCallBtn.style.display = 'none';
      setStatus('● En llamada');

      // Play greeting via TTS
      const greeting = '¡Hola! Soy SARA Garza de ABSTORAGES. ¿Con quién tengo el gusto y de qué empresa me contactas?';
      callState = 'speaking';
      await playTTS(greeting);

      if (inCall) startListening();
    }

    function hangup() {
      inCall = false;
      callState = 'idle';
      stopAudio();
      stopRec();
      overlay.classList.remove('active');
      openCallBtn.style.display = '';
      setStatus('Conectando…');
      soundBars.classList.remove('active');
    }

    btnMute.addEventListener('click', () => {
      muted = !muted;
      btnMute.classList.toggle('muted', muted);
      if (muted) {
        stopRec();
        setStatus('● Silenciado', '#f59e0b');
      } else {
        if (inCall && callState !== 'speaking' && callState !== 'processing') startListening();
      }
    });

    openCallBtn.addEventListener('click', openCall);
    btnHangup.addEventListener('click', hangup);
  </script>
</body>
</html>
