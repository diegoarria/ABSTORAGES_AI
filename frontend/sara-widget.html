<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SARA · ABSTORAGES</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a; color: #e8e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      padding: 12px 16px; background: #0f1d4a;
      border-bottom: 1px solid #1e3a7a;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1a3a8f url('/img/sara-avatar.png') center/cover no-repeat;
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-info .name   { font-weight: 600; font-size: .88rem; }
    .header-info .status { font-size: .7rem; color: #5cdb95; margin-top: 1px; }
    .btn-call {
      width: 32px; height: 32px; border-radius: 50%;
      background: #00B451; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, transform .15s;
    }
    .btn-call:hover { background: #009940; transform: scale(1.08); }

    .messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 9px;
      scrollbar-width: thin; scrollbar-color: #2a2a4a transparent;
    }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 82%; padding: 9px 13px;
      font-size: .82rem; line-height: 1.55; word-break: break-word;
    }
    .msg.sara .bubble {
      background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 10px 10px 10px 2px;
    }
    .msg.user .bubble {
      background: #1a3a8f; border: 1px solid #2a4abf;
      border-radius: 10px 10px 2px 10px;
    }
    .typing-wrap { display: flex; }
    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 10px 14px; background: #1a1a3a;
      border: 1px solid #2a2a4a; border-radius: 10px 10px 10px 2px;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #6b7280; animation: bounce 1.2s infinite; }
    .dot:nth-child(2){ animation-delay:.2s; } .dot:nth-child(3){ animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .input-row {
      padding: 10px 12px; background: #0f0f1a;
      border-top: 1px solid #2a2a4a; display: flex; gap: 8px; flex-shrink: 0;
    }
    .input-row input {
      flex: 1; background: #1a1a3a; border: 1px solid #2a2a4a;
      border-radius: 8px; padding: 9px 12px;
      color: #e8e8f0; font-size: .82rem; outline: none; transition: border .15s;
    }
    .input-row input:focus { border-color: #2563eb; }
    .input-row input:disabled { opacity: .45; cursor: not-allowed; }
    .send {
      width: 36px; height: 36px; border-radius: 8px;
      background: #1a3a8f; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .send:hover:not(:disabled) { background: #2563eb; }
    .send:disabled { opacity: .4; cursor: not-allowed; }
    .closed-bar {
      text-align: center; font-size: .72rem; color: #6b7280;
      padding: 10px; border-top: 1px solid #2a2a4a; background: #0f0f1a;
    }

    /* ── Call overlay ── */
    #call-overlay {
      display: none; position: absolute; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0a1628 0%, #0f2040 60%, #091520 100%);
      flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    #call-overlay.active { display: flex; }

    .call-photo {
      width: 90px; height: 90px; border-radius: 50%;
      background: #1a3a8f url('/img/sara-avatar.png') center/cover no-repeat;
      margin-bottom: 14px; flex-shrink: 0;
    }
    .call-photo.talking   { animation: ring-g 1.3s ease-out infinite; }
    .call-photo.listening { animation: ring-b 1s ease-in-out infinite alternate; }
    @keyframes ring-g { 0%{box-shadow:0 0 0 0 rgba(0,180,81,.65)} 70%{box-shadow:0 0 0 22px rgba(0,180,81,0)} 100%{box-shadow:0 0 0 0 rgba(0,180,81,0)} }
    @keyframes ring-b { from{box-shadow:0 0 0 0 rgba(37,99,235,.5)} to{box-shadow:0 0 0 16px rgba(37,99,235,0)} }

    .call-name { font-size: 1.05rem; font-weight: 700; color: #e8e8f0; margin-bottom: 2px; }
    .call-sub  { font-size: .7rem; color: #7ab0e8; margin-bottom: 14px; }
    .call-status {
      font-size: .76rem; color: #5cdb95; text-align: center;
      min-height: 36px; margin-bottom: 8px; padding: 0 16px; line-height: 1.5;
    }

    /* Audio level bar */
    .level-bar-wrap {
      width: 120px; height: 4px; background: #1a2a4a; border-radius: 2px;
      margin-bottom: 18px; overflow: hidden; opacity: 0; transition: opacity .3s;
    }
    .level-bar-wrap.visible { opacity: 1; }
    #level-bar { height: 100%; width: 0%; background: #2563eb; border-radius: 2px; transition: width .08s; }

    /* SARA talking bars */
    .sound-bars {
      display: flex; gap: 3px; align-items: flex-end; height: 22px;
      margin-bottom: 18px; opacity: 0; transition: opacity .2s;
    }
    .sound-bars.on { opacity: 1; }
    .bar { width: 4px; background: #00B451; border-radius: 2px; animation: bbar .6s ease-in-out infinite alternate; }
    .bar:nth-child(1){animation-delay:0s;animation-duration:.5s}
    .bar:nth-child(2){animation-delay:.1s;animation-duration:.7s}
    .bar:nth-child(3){animation-delay:.2s;animation-duration:.4s}
    .bar:nth-child(4){animation-delay:.05s;animation-duration:.6s}
    .bar:nth-child(5){animation-delay:.15s;animation-duration:.5s}
    @keyframes bbar { from{height:4px} to{height:18px} }

    .call-controls { display: flex; gap: 28px; align-items: center; }
    .btn-hangup {
      width: 54px; height: 54px; border-radius: 50%;
      background: #dc2626; border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-hangup:active { background: #b91c1c; transform: scale(.93); }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar"></div>
    <div class="header-info">
      <div class="name">SARA Garza · ABSTORAGES</div>
      <div class="status">● En línea</div>
    </div>
    <button class="btn-call" id="open-call" aria-label="Llamar a SARA">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.86 12 19.79 19.79 0 0 1 1.78 3.38 2 2 0 0 1 3.77 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.18 6.18l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <div id="call-overlay">
    <div class="call-photo" id="call-photo"></div>
    <div class="call-name">SARA Garza</div>
    <div class="call-sub">Ejecutiva Comercial · ABSTORAGES</div>
    <div class="call-status" id="call-status">Conectando…</div>
    <div class="sound-bars" id="sound-bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="level-bar-wrap" id="level-wrap"><div id="level-bar"></div></div>
    <div class="call-controls">
      <button class="btn-hangup" id="btn-hangup" aria-label="Colgar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.71 16.67C20.66 13.78 16.54 12 12 12 7.46 12 3.34 13.78.29 16.67c-.18.18-.29.43-.29.71 0 .28.11.53.29.71l2.48 2.48c.18.18.43.29.71.29.27 0 .52-.11.7-.28.79-.74 1.69-1.36 2.66-1.85.33-.16.56-.5.56-.9v-3.1c1.45-.47 2.98-.73 4.6-.73 1.62 0 3.15.26 4.6.72v3.1c0 .39.23.74.56.9.98.49 1.87 1.12 2.67 1.85.18.18.43.28.7.28.28 0 .53-.11.71-.29l2.48-2.48c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="messages" id="msgs"></div>
  <div id="bottom">
    <div class="input-row">
      <input id="inp" type="text" placeholder="Escribe tu mensaje..." autofocus>
      <button class="send" id="btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BASE    = window.location.origin;
    const SESSION = 'widget_' + Math.random().toString(36).slice(2);
    const msgsEl  = document.getElementById('msgs');
    const inp     = document.getElementById('inp');
    const btn     = document.getElementById('btn');
    let closed = false;

    // ── Chat ─────────────────────────────────────────────────────────────────
    function addBubble(role, html) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.innerHTML = `<div class="bubble">${html}</div>`;
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return d;
    }
    function toHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    }
    function showTyping() {
      const d = document.createElement('div');
      d.className = 'typing-wrap'; d.id = 'typ';
      d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    function hideTyping() { document.getElementById('typ')?.remove(); }
    function closeChat() {
      closed = true;
      document.getElementById('bottom').innerHTML =
        '<div class="closed-bar">— Chat finalizado · Gracias por contactar ABSTORAGES —</div>';
    }
    function cleanText(t) {
      return t.replace(/NUEVA_ORDEN\s*:\s*\{[\s\S]*?\}/gi,'')
              .replace(/LEAD_DATA\s*:\s*\{[^\n]*\}/gi,'')
              .replace(/CERRAR_CHAT|ESCALAR_HUMANO/gi,'')
              .replace(/<[^>]+>/g,'').trim();
    }
    function cleanForTTS(t) {
      return t
        .replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
        .replace(/#{1,6}\s*/g,'').replace(/^\s*[-•*]\s+/gm,'')
        .replace(/^\s*\d+\.\s+/gm,'').replace(/`[^`]*`/g,'')
        .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/[^\S\n]+/g,' ').replace(/\n{2,}/g,'. ').replace(/\n/g,' ')
        .replace(/\.{2,}/g,'.').trim();
    }

    async function sendMessage(text) {
      if (!text || closed) return null;
      addBubble('user', toHtml(text));
      inp.disabled = true; btn.disabled = true;
      showTyping();
      let saraText = '', saraDiv = null;
      try {
        const res = await fetch(`${BASE}/api/widget/chat`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId: SESSION }),
        });
        hideTyping();
        const reader = res.body.getReader(), dec = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of dec.decode(value).split('\n')) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'chunk') {
                saraText += evt.text;
                const c = cleanText(saraText);
                if (!saraDiv) saraDiv = addBubble('sara', toHtml(c));
                else saraDiv.querySelector('.bubble').innerHTML = toHtml(c);
                msgsEl.scrollTop = msgsEl.scrollHeight;
              } else if (evt.type === 'cerrar_chat') { closeChat(); return saraText; }
            } catch {}
          }
        }
      } catch {
        hideTyping();
        addBubble('sara', 'Error de conexión. Intenta de nuevo.');
      }
      if (!closed) { inp.disabled = false; btn.disabled = false; inp.focus(); }
      return saraText;
    }

    async function send() {
      const text = inp.value.trim();
      if (!text || closed) return;
      inp.value = '';
      await sendMessage(text);
    }
    btn.addEventListener('click', send);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });
    addBubble('sara', '¡Hola! Soy <b>SARA Garza</b>, ejecutiva comercial de <b>ABSTORAGES Logistics Solutions</b>.<br>¿Con quién tengo el gusto y de qué empresa me contactas?');

    // ── Call — VAD + MediaRecorder + ElevenLabs STT ───────────────────────────
    //
    // Flujo completamente manos libres en todos los dispositivos:
    // 1. getUserMedia() una sola vez al tocar el botón de llamada
    // 2. AudioContext + AnalyserNode miden el nivel de audio 60fps
    // 3. Cuando el usuario habla (nivel > umbral) → MediaRecorder graba
    // 4. Cuando el usuario se calla (silencio > 900ms) → envía audio a /api/widget/stt
    // 5. ElevenLabs Scribe transcribe → SARA responde → TTS → vuelve a escuchar
    // 6. Si el usuario habla mientras SARA habla → barge-in (corta el audio)

    const overlay    = document.getElementById('call-overlay');
    const callPhoto  = document.getElementById('call-photo');
    const callStatus = document.getElementById('call-status');
    const soundBars  = document.getElementById('sound-bars');
    const levelWrap  = document.getElementById('level-wrap');
    const levelBar   = document.getElementById('level-bar');
    const btnHangup  = document.getElementById('btn-hangup');
    const openCallBtn= document.getElementById('open-call');

    // State
    let inCall       = false;
    let callState    = 'idle';   // idle | listening | recording | processing | speaking
    let micStream    = null;
    let audioCtx     = null;
    let analyser     = null;
    let mediaRec     = null;
    let audioChunks  = [];
    let activeNode   = null;     // Web Audio source currently playing
    let vadActive    = false;
    let silenceTimer = null;
    let vadRafId     = null;

    // VAD config
    const SPEAK_THRESHOLD = 0.018;  // RMS amplitude to consider "speaking"
    const SILENCE_MS      = 900;    // ms of quiet before sending clip
    const MIN_BYTES       = 2000;   // ignore clips too short (noise)

    function setStatus(txt, color) {
      callStatus.textContent = txt;
      callStatus.style.color = color || '#5cdb95';
    }
    function setSpeaking(on) {
      callPhoto.classList.toggle('talking', on);
      callPhoto.classList.toggle('listening', false);
      soundBars.classList.toggle('on', on);
      levelWrap.classList.toggle('visible', false);
    }
    function setListening(on) {
      callPhoto.classList.toggle('listening', on);
      callPhoto.classList.toggle('talking', false);
      soundBars.classList.toggle('on', false);
      levelWrap.classList.toggle('visible', on);
    }

    // Stop TTS immediately (barge-in)
    function stopTTS() {
      if (activeNode) { try { activeNode.stop(); } catch {} activeNode = null; }
      setSpeaking(false);
    }

    // Play TTS via Web Audio (works on mobile after audioCtx created in user gesture)
    async function playTTS(text) {
      if (!text || !inCall) return;
      setSpeaking(true);
      setStatus('● SARA está hablando…');
      try {
        const res = await fetch(`${BASE}/api/widget/tts`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error('tts');
        const buf = await res.arrayBuffer();
        if (!inCall) return;
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const decoded = await audioCtx.decodeAudioData(buf);
        if (!inCall) return;
        activeNode = audioCtx.createBufferSource();
        activeNode.buffer = decoded;
        activeNode.connect(audioCtx.destination);
        await new Promise(r => { activeNode.onended = r; activeNode.start(0); });
        activeNode = null;
      } catch { activeNode = null; }
      setSpeaking(false);
    }

    // Send audio clip to ElevenLabs Scribe via backend
    async function transcribeAndRespond(blob) {
      if (!inCall || blob.size < MIN_BYTES) {
        callState = 'listening';
        setListening(true);
        setStatus('● Escuchando…');
        return;
      }

      callState = 'processing';
      setListening(false);
      setStatus('● Procesando…', '#7ab0e8');

      try {
        const form = new FormData();
        form.append('audio', blob, 'clip.webm');
        const sttRes = await fetch(`${BASE}/api/widget/stt`, { method: 'POST', body: blob,
          headers: { 'Content-Type': blob.type || 'audio/webm' } });
        const { text } = await sttRes.json();

        if (text && inCall) {
          callState = 'speaking';
          const raw = await sendMessage(text);
          if (raw && inCall) await playTTS(cleanForTTS(cleanText(raw)));
        }
      } catch {}

      if (inCall) {
        callState = 'listening';
        setListening(true);
        setStatus('● Escuchando…');
      }
    }

    // VAD loop — runs at ~60fps via requestAnimationFrame
    function vadLoop() {
      if (!inCall || !analyser) return;

      const data = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(data);
      const rms = Math.sqrt(data.reduce((s, v) => s + v * v, 0) / data.length);
      const pct = Math.min(100, (rms / SPEAK_THRESHOLD) * 50);
      levelBar.style.width = pct + '%';

      const isSpeaking = rms > SPEAK_THRESHOLD;

      if (isSpeaking) {
        // Barge-in: cut SARA mid-sentence
        if (callState === 'speaking') {
          stopTTS();
          callState = 'listening';
        }

        // Start recording if not already
        if (callState === 'listening' && !vadActive) {
          vadActive = true;
          callState = 'recording';
          setListening(false);
          callPhoto.classList.add('listening');
          setStatus('● Escuchando…');
          audioChunks = [];
          try {
            mediaRec = new MediaRecorder(micStream);
            mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRec.start();
          } catch {}
        }

        // Reset silence timer on speech
        if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }

      } else if (vadActive && !silenceTimer) {
        // User went quiet — start silence countdown
        silenceTimer = setTimeout(() => {
          silenceTimer = null;
          vadActive = false;
          if (mediaRec && mediaRec.state === 'recording') {
            mediaRec.onstop = () => {
              const blob = new Blob(audioChunks, { type: mediaRec.mimeType || 'audio/webm' });
              audioChunks = [];
              transcribeAndRespond(blob);
            };
            mediaRec.stop();
          }
        }, SILENCE_MS);
      }

      vadRafId = requestAnimationFrame(vadLoop);
    }

    async function openCall() {
      // audioCtx must be created HERE (synchronous user gesture context)
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Unlock with silent buffer
        const buf = audioCtx.createBuffer(1, 1, 22050);
        const src = audioCtx.createBufferSource();
        src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
      } catch {}

      // Request mic permission
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch {
        setStatus('⚠ Permite el micrófono para usar la llamada', '#f59e0b');
        return;
      }

      // Connect mic to analyser (NOT to destination — no echo)
      const micSource = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      micSource.connect(analyser);

      inCall = true;
      callState = 'speaking';
      overlay.classList.add('active');
      openCallBtn.style.display = 'none';
      setStatus('● En llamada');

      // SARA greeting
      await playTTS('¡Hola! Soy SARA Garza de ABSTORAGES. ¿Con quién tengo el gusto y de qué empresa me contactas?');

      if (inCall) {
        callState = 'listening';
        setListening(true);
        setStatus('● Escuchando…');
        vadRafId = requestAnimationFrame(vadLoop);
      }
    }

    function hangup() {
      inCall = false; callState = 'idle'; vadActive = false;
      if (vadRafId) { cancelAnimationFrame(vadRafId); vadRafId = null; }
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
      stopTTS();
      if (mediaRec && mediaRec.state === 'recording') { try { mediaRec.stop(); } catch {} }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      overlay.classList.remove('active');
      openCallBtn.style.display = '';
      callPhoto.classList.remove('talking', 'listening');
      soundBars.classList.remove('on');
      levelWrap.classList.remove('visible');
      setStatus('Conectando…');
    }

    openCallBtn.addEventListener('click', openCall); // audioCtx creation inside openCall
    btnHangup.addEventListener('click', hangup);
  </script>
</body>
</html>
